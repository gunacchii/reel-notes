<div id="root">

<script>
  function showBootError(detail) {
    var m = document.getElementById('boot-msg');
    var e = document.getElementById('boot-error');
    var d = document.getElementById('boot-error-detail');
    if (m) m.style.display = 'none';
    if (e) e.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#8b93a3;font:14px -apple-system,Inter,sans-serif;text-align:center;padding:24px;';
    if (d && detail) d.textContent = detail;
  }
  // catches anything Babel/React themselves fail on (e.g. a real syntax error
  // in the app's own code) and shows the actual message instead of a silent hang
  window.addEventListener('error', function (event) {
    var msg = event && event.message ? event.message : 'Unknown error';
    var loc = event && event.filename ? ' (' + event.filename.split('/').pop() + ':' + event.lineno + ':' + event.colno + ')' : '';
    showBootError('App error: ' + msg + loc);
  });
</script>

const uid = (p = "id") => `${p}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;

function formatTime(sec = 0) {
  if (!isFinite(sec) || sec < 0) sec = 0;
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = Math.floor(sec % 60);
  const pad = (n) => String(n).padStart(2, "0");
  return h > 0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
}

// Turns any http(s):// or www. links inside a block of text into clickable
// links that open in a new tab, leaving everything else as plain text.
// Deliberately avoids regex literals entirely (plain string methods only).
function linkifyText(text) {
  if (!text) return text;
  var TRIM_CHARS = ".,!?;:)\"'";
  var words = text.split(" ");
  return words.map(function (word, i) {
    var sep = i < words.length - 1 ? " " : "";
    var lower = word.toLowerCase();
    var isUrl = lower.indexOf("http://") === 0 || lower.indexOf("https://") === 0 || lower.indexOf("www.") === 0;
    if (!isUrl) return word + sep;
    var trailing = "";
    var clean = word;
    while (clean.length > 0 && TRIM_CHARS.indexOf(clean.charAt(clean.length - 1)) !== -1) {
      trailing = clean.charAt(clean.length - 1) + trailing;
      clean = clean.slice(0, -1);
    }
    if (!clean) return word + sep;
    var href = clean.toLowerCase().indexOf("http") === 0 ? clean : "https://" + clean;
    return (
      <span key={i}>
        <a
          href={href}
          target="_blank"
          rel="noopener noreferrer"
          onClick={function (e) { e.stopPropagation(); }}
          style={{ color: "var(--accent)", textDecoration: "underline", wordBreak: "break-all" }}
        >
          {clean}
        </a>
        {trailing + sep}
      </span>
    );
  });
}

// Parses "MM:SS" or "HH:MM:SS" (or a bare number of seconds) back into seconds.
// Returns null if the input isn't a valid timecode.
function parseTimeToSeconds(str) {
  if (typeof str !== "string") return null;
  const parts = str.trim().split(":").map((p) => p.trim());
  if (parts.length === 0 || parts.some((p) => p === "" || isNaN(Number(p)))) return null;
  const nums = parts.map(Number);
  let seconds;
  if (nums.length === 3) seconds = nums[0] * 3600 + nums[1] * 60 + nums[2];
  else if (nums.length === 2) seconds = nums[0] * 60 + nums[1];
  else if (nums.length === 1) seconds = nums[0];
  else return null;
  return seconds < 0 ? null : seconds;
}

// Given the current visual order of ids, moves draggedIds to sit just before targetId
// and returns the resulting full ordered id list.
function reorderIds(currentIds, draggedIds, targetId) {
  const draggedSet = new Set(draggedIds);
  const remaining = currentIds.filter((id) => !draggedSet.has(id));
  const targetIndex = remaining.indexOf(targetId);
  const insertAt = targetIndex === -1 ? remaining.length : targetIndex;
  return [...remaining.slice(0, insertAt), ...draggedIds, ...remaining.slice(insertAt)];
}

const SUPABASE_URL = "https://spewxximxelaybgtvstd.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_vMVeOgxsk33OfmKgq40swQ_aRd7j8e3";

const SIGNED_URL_TTL = 60 * 60 * 24; // 24 hours

function getStoredSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
function persistSession(session) {
  try {
    if (session) localStorage.setItem(SESSION_KEY, JSON.stringify(session));
    else localStorage.removeItem(SESSION_KEY);
  } catch { /* ignore storage errors (e.g. private browsing) */ }
}

const sessionListeners = new Set();
function setSession(session) {
  currentSession = session;
  persistSession(session);
  sessionListeners.forEach((fn) => fn(session));
}
function onSessionChange(fn) {
  sessionListeners.add(fn);
  return () => sessionListeners.delete(fn);
}

async function authRequest(path, body) {
  const res = await fetch(`${SUPABASE_URL}/auth/v1${path}`, {
    method: "POST",
    headers: { "Content-Type": "application/json", apikey: SUPABASE_ANON_KEY },
    body: JSON.stringify(body),
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error_description || data.msg || data.error || "Something went wrong.");
  return data;
}
function applyAuthResponse(data) {
  if (data && data.access_token) {
    setSession({
      access_token: data.access_token,
      refresh_token: data.refresh_token,
      expires_at: Date.now() + (data.expires_in || 3600) * 1000,
      user: data.user || null,
    });
  }
}

}

  const data = await authRequest("/token?grant_type=password", { email, password });

async function refreshSession() {
  if (!currentSession || !currentSession.refresh_token) return null;
  try {
    const data = await authRequest("/token?grant_type=refresh_token", { refresh_token: currentSession.refresh_token });
    applyAuthResponse(data);
    return currentSession;
  } catch (err) {
    console.warn("Session refresh failed — signing out:", err.message);
    setSession(null);
    return null;
  }
}
async function signOut() {
  if (currentSession && currentSession.access_token) {

      });
    } catch { /* ignore — we're clearing the local session either way */ }

}
function signInWithGoogle() {

// after a Google OAuth redirect, tokens come back as a URL hash fragment
function consumeAuthRedirect() {
  if (window.location.hash.includes("access_token")) {
    const params = new URLSearchParams(window.location.hash.slice(1));
    const access_token = params.get("access_token");
    const refresh_token = params.get("refresh_token");
    const expires_in = Number(params.get("expires_in") || 3600);
    if (access_token) {
      setSession({ access_token, refresh_token, expires_at: Date.now() + expires_in * 1000, user: null });
      window.history.replaceState(null, "", window.location.pathname + window.location.search);
      return true;
    }
  }

}
// makes sure we have a non-expired access token before any API call, quietly
// refreshing it first if it's about to expire. Many requests can fire at once
// (loadAllData runs several in parallel), so concurrent callers share a single
// in-flight refresh instead of each racing to refresh independently — Supabase
// rotates the refresh token, so a race here would invalidate every call but the
// first and silently sign the person out.
let refreshPromise = null;
async function ensureFreshSession() {
  if (!currentSession) return null;
  if (currentSession.expires_at - Date.now() < 60000) {
    if (!refreshPromise) {
      refreshPromise = refreshSession().finally(() => { refreshPromise = null; });
    }
    return await refreshPromise;
  }
  return currentSession;
}
async function authHeader() {
  const session = await ensureFreshSession();
  return session ? session.access_token : SUPABASE_ANON_KEY;
}
async function getCurrentUser() {
  const session = await ensureFreshSession();
  if (!session) return null;
  if (session.user) return session.user;
  const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
    headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${session.access_token}` },
  });
  if (!res.ok) return null;
  const user = await res.json();
  setSession({ ...session, user });
  return user;
}

/* ---- database (PostgREST) ---- */
async function dbRequest(method, table, { query = "", body, extraHeaders = {} } = {}) {
  const token = await authHeader();
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, {
    method,
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${token}`,
      ...extraHeaders,
    },
    body: body !== undefined ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `Request to ${table} failed`);
  }
  if (res.status === 204) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}
const db = {
  select: (table, query = "?select=*") => dbRequest("GET", table, { query }),
  insert: (table, row) => dbRequest("POST", table, { body: row, extraHeaders: { Prefer: "return=representation" } }),
  update: (table, filter, patch) => dbRequest("PATCH", table, { query: `?${filter}`, body: patch }),
  delete: (table, filter) => dbRequest("DELETE", table, { query: `?${filter}` }),
};

// Converts a canvas data URL (from the drawing feature) into a Blob for upload.
function dataURLtoBlob(dataUrl) {
  const [header, base64] = dataUrl.split(",");
  const mime = header.match(/:(.*?);/)[1];
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new Blob([bytes], { type: mime });
}

// Public URL for a file in a bucket marked public — no auth or signing needed.
// Used only by the public share view; everywhere else in the app still uses
// short-lived signed URLs against the private buckets.
function publicStorageUrl(bucket, path) {
  if (!path) return null;
  return `${SUPABASE_URL}/storage/v1/object/public/${bucket}/${path}`;
}

    method: "POST",
    headers: { "Content-Type": "application/json", apikey: SUPABASE_ANON_KEY },
    body: JSON.stringify({ p_video_id: videoId, p_note_id: noteId, p_text: text, p_guest_name: guestName, p_password: password || null }),
  });
  if (!res.ok) throw new Error("Couldn't post that reply.");
  return res.json();
}

async function updateSharedVideoStatus(videoId, status, password) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/update_shared_video_status`, {
    method: "POST",
    headers: { "Content-Type": "application/json", apikey: SUPABASE_ANON_KEY },
    body: JSON.stringify({ p_video_id: videoId, p_status: status, p_password: password || null }),
  });
  if (!res.ok) throw new Error("Couldn't update the status.");
  return res.json();
}

// remembers the name a guest commenter typed in, so they're only asked once
// per browser rather than on every single reply
const GUEST_NAME_KEY = "reelnotes_guest_name";
function getGuestName() {
  try { return localStorage.getItem(GUEST_NAME_KEY) || ""; } catch { return ""; }
}
function setGuestName(name) {
  try { localStorage.setItem(GUEST_NAME_KEY, name); } catch { /* ignore */ }
}

// video with no real parent maps to ROOT_ID locally and to a NULL parent/folder
// column in Supabase.

const ROOT_ID = "root";
const seedFolders = () => ({
  [ROOT_ID]: { id: ROOT_ID, name: "All Projects", parentId: null, archived: false },
});

function AuthScreen() {
  const [mode, setMode] = useState("signin"); // "signin" | "signup"
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [info, setInfo] = useState("");

  const switchMode = () => {
    setMode((m) => (m === "signin" ? "signup" : "signin"));
    setError("");
    setInfo("");
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError("");
    setInfo("");
    setLoading(true);
    try {
      if (mode === "signin") {
        await signInWithPassword(email, password);
      } else {
        await signUpWithPassword(email, password);
        setInfo("Check your email to confirm your account, then sign in.");
      }
    } catch (err) {
      setError(err.message || "Something went wrong. Please try again.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <div className="card" style={{ width: "100%", maxWidth: 380, padding: 32 }}>
        <p className="display" style={{ fontSize: 22, fontWeight: 700, marginBottom: 4 }}>Reel Notes</p>
        <p style={{ fontSize: 13, color: "var(--muted)", marginBottom: 24 }}>
          {mode === "signin" ? "Sign in to your shared workspace" : "Create an account to get started"}
        </p>

        <button
          type="button"
          onClick={signInWithGoogle}
          className="btn"
          style={{ width: "100%", justifyContent: "center", padding: "10px 14px", marginBottom: 16, fontSize: 14 }}
        >
          <GoogleIcon size={16} /> Continue with Google
        </button>

        <div style={{ display: "flex", alignItems: "center", gap: 10, margin: "16px 0", color: "var(--muted)", fontSize: 12 }}>
          <div style={{ flex: 1, height: 1, background: "var(--border)" }} />
          or
          <div style={{ flex: 1, height: 1, background: "var(--border)" }} />
        </div>

        <form onSubmit={handleSubmit}>
          <label style={{ fontSize: 12, color: "var(--muted)", display: "block", marginBottom: 5 }}>Email</label>
          <input
            type="email"
            required
            autoComplete="email"
            className="field"
            style={{ marginBottom: 14 }}
            value={email}
            onChange={(e) => setEmail(e.target.value)}
          />
          <label style={{ fontSize: 12, color: "var(--muted)", display: "block", marginBottom: 5 }}>Password</label>
          <input
            type="password"
            required
            autoComplete={mode === "signin" ? "current-password" : "new-password"}
            minLength={6}
            className="field"
            style={{ marginBottom: 18 }}
            value={password}
            onChange={(e) => setPassword(e.target.value)}
          />

          {error && <p style={{ fontSize: 12.5, color: "var(--danger)", marginBottom: 14 }}>{error}</p>}
          {info && <p style={{ fontSize: 12.5, color: "var(--accent)", marginBottom: 14 }}>{info}</p>}

          <button
            type="submit"
            className="btn btn-accent"
            disabled={loading}
            style={{ width: "100%", justifyContent: "center", padding: "10px 14px", fontSize: 14 }}
          >
            {loading ? "Please wait…" : mode === "signin" ? "Sign in" : "Sign up"}
          </button>
        </form>

        <p style={{ fontSize: 12.5, color: "var(--muted)", marginTop: 18, textAlign: "center" }}>
          {mode === "signin" ? "Don't have an account?" : "Already have an account?"}{" "}
          <span onClick={switchMode} style={{ color: "var(--accent)", cursor: "pointer", fontWeight: 600 }}>
            {mode === "signin" ? "Sign up" : "Sign in"}
          </span>
        </p>
      </div>
    </div>
  );
}

/* ================= APP ================= */

function App() {
  const [session, setSessionState] = useState(undefined); // undefined = checking, null = signed out
  const [profile, setProfile] = useState(null);
  const [folders, setFolders] = useState(seedFolders);
  const [videos, setVideos] = useState({});
  const [screen, setScreen] = useState("home"); // home | video
  const [activeTab, setActiveTab] = useState("home"); // home | dashboard | archive
  const [currentFolderId, setCurrentFolderId] = useState(ROOT_ID);
  const [currentVideoId, setCurrentVideoId] = useState(null);
  const [query, setQuery] = useState("");
  const [dataLoaded, setDataLoaded] = useState(false);
  const [loadError, setLoadError] = useState("");

  // check for an existing session (or one just returned from a Google redirect)
  useEffect(() => {
    consumeAuthRedirect();
    const unsubscribe = onSessionChange((s) => setSessionState(s));
    (async () => {
      if (currentSession) await getCurrentUser(); // fills in session.user if missing
      setSessionState(currentSession);
    })();
    return unsubscribe;
  }, []);

  // load this person's profile once signed in
  useEffect(() => {
    if (!session || !session.user) { setProfile(null); return; }
    db.select("profiles", `?id=eq.${session.user.id}&select=*`)
      .then((rows) => setProfile((rows && rows[0]) || null))
      .catch(() => setProfile(null));
  }, [session?.user?.id]);

  // pulls the entire shared workspace and reshapes it into the same local
  // data shape the rest of the app already expects
  const signedUrlCacheRef = useRef({}); // "bucket/path" -> { url, expiresAt } — reused across polls so a
  // playing <video>'s src doesn't change underneath it every time we refresh
  const getCachedSignedUrl = useCallback(async (bucket, path) => {
    const key = `${bucket}/${path}`;
    const cached = signedUrlCacheRef.current[key];
    // reuse an existing URL until it's within an hour of expiring
    if (cached && cached.expiresAt - Date.now() > 60 * 60 * 1000) return cached.url;
    const url = await storageSignedUrl(bucket, path);
    if (url) signedUrlCacheRef.current[key] = { url, expiresAt: Date.now() + SIGNED_URL_TTL * 1000 };
    return url;
  }, []);

  const loadAllData = useCallback(async () => {
    try {
      const [foldersRows, videosRows, notesRows, repliesRows, profilesRows] = await Promise.all([
        db.select("folders"),
        db.select("videos"),
        db.select("notes"),
        db.select("note_replies"),
        db.select("profiles"),
      ]);

      const profileMap = {};
      (profilesRows || []).forEach((p) => { profileMap[p.id] = p.display_name || "Someone"; });

      const repliesByNote = {};
      (repliesRows || []).forEach((r) => {
        (repliesByNote[r.note_id] ||= []).push({
          id: r.id, text: r.text, authorName: profileMap[r.created_by] || "Someone",
        });
      });

      const drawingPaths = (notesRows || []).map((n) => n.drawing_path).filter(Boolean);
      const drawingUrlEntries = await Promise.all(drawingPaths.map(async (p) => [p, await getCachedSignedUrl("drawings", p)]));
      const drawingUrlMap = Object.fromEntries(drawingUrlEntries);

      const notesByVideo = {};
      (notesRows || []).forEach((n) => {
        const note = {
          id: n.id,
          time: Number(n.time_seconds),
          endTime: n.end_time_seconds != null ? Number(n.end_time_seconds) : null,
          text: n.text || "",
          drawing: n.drawing_path ? drawingUrlMap[n.drawing_path] : null,
          replies: repliesByNote[n.id] || [],
          createdAt: new Date(n.created_at).getTime(),
          authorName: profileMap[n.created_by] || "Someone",
        };
        (notesByVideo[n.video_id] ||= []).push(note);
      });
      Object.values(notesByVideo).forEach((list) => list.sort((a, b) => a.time - b.time));

      const readyVideos = (videosRows || []).filter((v) => v.status === "ready" && v.storage_path);
      const videoUrlEntries = await Promise.all(readyVideos.map(async (v) => [v.id, await getCachedSignedUrl("videos", v.storage_path)]));
      const videoUrlMap = Object.fromEntries(videoUrlEntries);

      const nextFolders = { ...seedFolders() };
      (foldersRows || []).forEach((f) => {
        nextFolders[f.id] = { id: f.id, name: f.name, parentId: f.parent_id || ROOT_ID, archived: f.archived, order: f.order_index };
      });

      const nextVideos = {};
      (videosRows || []).forEach((v) => {
        nextVideos[v.id] = {
          id: v.id,
          folderId: v.folder_id || ROOT_ID,
          name: v.name,
          url: videoUrlMap[v.id] || null,
          notes: notesByVideo[v.id] || [],
          locked: v.locked, password: v.password || "",
          status: v.status,
          progress: v.status === "ready" ? 100 : 0,
          archived: v.archived,
          updatedAt: new Date(v.updated_at).getTime(),
          order: v.order_index,
          reviewStatus: v.review_status,
        };
      });

      setFolders(nextFolders);
      setVideos((prev) => {
        // preserve the local, purely cosmetic upload-progress animation for videos
        // still processing — that number only ever lives in the browser, not the DB
        const merged = nextVideos;
        Object.keys(merged).forEach((id) => {
          if (merged[id].status === "processing" && prev[id]?.progress != null) {
            merged[id] = { ...merged[id], progress: prev[id].progress };
          }
        });
        return merged;
      });
      setLoadError("");
      setDataLoaded(true);
    } catch (err) {
      console.error("Couldn't load workspace data:", err);
      setLoadError(err.message || "Something went wrong loading your data.");
      setDataLoaded(true); // stop showing an infinite spinner — show the error screen instead
    }
  }, [getCachedSignedUrl]);

  // once signed in: load everything once
  useEffect(() => {
    if (!session) return;
    setDataLoaded(false);
    loadAllData();
  }, [session, loadAllData]);

  // then keep it fresh with light polling (simpler and more robust here than a
  // websocket subscription) — but pause it while a video is actually playing,
  // so background refreshes don't compete with it for bandwidth and cause stutter
  useEffect(() => {
    if (!session || screen === "video") return;
    const interval = setInterval(loadAllData, 6000);
    return () => clearInterval(interval);
  }, [session, screen, loadAllData]);

  /* ---- folder ops ---- */
  const createFolder = async (parentId, name) => {
    const rows = await db.insert("folders", {
      name: name || "Untitled Folder",
      parent_id: parentId === ROOT_ID ? null : parentId,
      created_by: session.user.id,
    });
    await loadAllData();
    return rows && rows[0] ? rows[0].id : null;
  };
  const renameFolder = async (id, name) => {
    if (!name) return;
    await db.update("folders", `id=eq.${id}`, { name });
  };
  const archiveFolder = async (id, archived) => {
    await db.update("folders", `id=eq.${id}`, { archived });
  };
  const deleteFolderRecursive = async (id) => {
    // gather every video's storage file under this folder tree before the DB
    // cascade deletes the rows, so we can clean up the actual files too
    const allFolders = await db.select("folders", "?select=id,parent_id");
    const toDelete = new Set([id]);
    let changed = true;
    while (changed) {
      changed = false;
      (allFolders || []).forEach((f) => {
        if (toDelete.has(f.parent_id) && !toDelete.has(f.id)) { toDelete.add(f.id); changed = true; }
      });
    }
    const victimVideos = await db.select("videos", `?select=id,storage_path&folder_id=in.(${[...toDelete].join(",")})`);
    await db.delete("folders", `id=eq.${id}`);
    const paths = (victimVideos || []).map((v) => v.storage_path).filter(Boolean);
    if (paths.length) await storageRemove("videos", paths);
    await loadAllData();
  };
  // moves a folder to become a child of newParentId; refuses if that would move
  // the folder into itself (the database's own FK constraints stop deeper cycles)
  const moveFolderToFolder = async (id, newParentId) => {
    if (id === newParentId) return;
    await db.update("folders", `id=eq.${id}`, { parent_id: newParentId === ROOT_ID ? null : newParentId });
  };
  const reorderFolders = async (orderedIds) => {
    await Promise.all(orderedIds.map((id, i) => db.update("folders", `id=eq.${id}`, { order_index: i })));
    await loadAllData();
  };

  /* ---- video ops ---- */
  const addVideoFile = async (file, folderId) => {
    if (!file || !file.type.startsWith("video/")) return;
    const rows = await db.insert("videos", {
      folder_id: folderId === ROOT_ID ? null : folderId,
      name: file.name.replace(/\.[^/.]+$/, ""),
      status: "processing",
      created_by: session.user.id,
    });
    if (!rows || !rows[0]) return;
    const id = rows[0].id;
    await loadAllData();

    // purely cosmetic progress animation while the real upload happens in parallel
    const totalMs = Math.min(4500, Math.max(800, file.size / 3500));
    const start = Date.now();
    const interval = setInterval(() => {
      const elapsed = Date.now() - start;
      const pct = Math.min(96, Math.round((elapsed / totalMs) * 100));
      setVideos((v) => (v[id] && v[id].status === "processing" ? { ...v, [id]: { ...v[id], progress: pct } } : v));
      if (elapsed >= totalMs) clearInterval(interval);
    }, 90);

    const ext = (file.name.split(".").pop() || "mp4").toLowerCase();
    const path = `${id}.${ext}`;
    try {
      await storageUpload("videos", path, file);
    } catch (err) {
      clearInterval(interval);
      console.error("Upload failed:", err);
      await db.delete("videos", `id=eq.${id}`);
      await loadAllData();
      return;
    }
    clearInterval(interval);
    await db.update("videos", `id=eq.${id}`, { storage_path: path, status: "ready", updated_at: new Date().toISOString() });
    await loadAllData();
  };
  const deleteVideo = async (id) => {
    const rows = await db.select("videos", `?id=eq.${id}&select=storage_path`);
    await db.delete("videos", `id=eq.${id}`);
    const path = rows && rows[0] && rows[0].storage_path;
    if (path) await storageRemove("videos", [path]);
    await loadAllData();
  };
  const updateVideo = async (id, patch) => {
    const dbPatch = { updated_at: new Date().toISOString() };
    if (patch.name !== undefined) dbPatch.name = patch.name;
    if (patch.archived !== undefined) dbPatch.archived = patch.archived;
    if (patch.locked !== undefined) dbPatch.locked = patch.locked;
    if (patch.password !== undefined) dbPatch.password = patch.password;
    if (patch.reviewStatus !== undefined) dbPatch.review_status = patch.reviewStatus;
    await db.update("videos", `id=eq.${id}`, dbPatch);
  };
  const archiveVideo = async (id, archived) => updateVideo(id, { archived });
  const renameVideo = async (id, name) => { if (name.trim()) await updateVideo(id, { name: name.trim() }); };
  const setVideoReviewStatus = async (id, reviewStatus) => updateVideo(id, { reviewStatus });
  const moveVideoToFolder = async (id, folderId) => {
    await db.update("videos", `id=eq.${id}`, { folder_id: folderId === ROOT_ID ? null : folderId });
  };
  const reorderVideos = async (orderedIds) => {
    await Promise.all(orderedIds.map((id, i) => db.update("videos", `id=eq.${id}`, { order_index: i })));
    await loadAllData();
  };

  /* ---- note ops ---- */
  const addNote = async (videoId, time, text, endTime = null, drawing = null) => {
    if (!text.trim() && !drawing) return;
    let drawing_path = null;
    if (drawing) {
      const blob = dataURLtoBlob(drawing);
      drawing_path = `${videoId}/${crypto.randomUUID()}.png`;
      try {
        await storageUpload("drawings", drawing_path, blob);
      } catch (err) {
        console.error("Couldn't save drawing:", err);
        drawing_path = null;
      }
    }
    await db.insert("notes", {
      video_id: videoId, time_seconds: time, end_time_seconds: endTime,
      text: text.trim(), drawing_path, created_by: session.user.id,
    });
    await db.update("videos", `id=eq.${videoId}`, { updated_at: new Date().toISOString() });
    await loadAllData();
  };
  const editNote = async (videoId, noteId, text) => {
    await db.update("notes", `id=eq.${noteId}`, { text });
  };
  const editNoteTime = async (videoId, noteId, time, endTime) => {
    await db.update("notes", `id=eq.${noteId}`, { time_seconds: time, end_time_seconds: endTime ?? null });
  };
  const deleteNote = async (videoId, noteId) => {
    const rows = await db.select("notes", `?id=eq.${noteId}&select=drawing_path`);
    await db.delete("notes", `id=eq.${noteId}`);
    const path = rows && rows[0] && rows[0].drawing_path;
    if (path) await storageRemove("drawings", [path]);
    await loadAllData();
  };
  const addReply = async (videoId, noteId, text) => {
    if (!text.trim()) return;
    await db.insert("note_replies", { note_id: noteId, text: text.trim(), created_by: session.user.id });
    await db.update("videos", `id=eq.${videoId}`, { updated_at: new Date().toISOString() });
    await loadAllData();
  };
  const deleteReply = async (videoId, noteId, replyId) => {
    await db.delete("note_replies", `id=eq.${replyId}`);
    await loadAllData();
  };

  const openVideo = (id) => {
    if (videos[id]?.status !== "ready") return;
    setCurrentVideoId(id);
    setScreen("video");
  };
  const goHome = () => {
    setScreen("home");
    setCurrentVideoId(null);
    loadAllData();
  };

  const currentVideo = currentVideoId ? videos[currentVideoId] : null;

  return (
    <>
      {session === undefined ? (
        <LoadingScreen label="Checking your session…" />
      ) : session === null ? (
        <AuthScreen />
      ) : !dataLoaded ? (
        <LoadingScreen label="Loading your workspace…" />
      ) : loadError ? (
        <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
          <div className="card" style={{ width: "100%", maxWidth: 400, padding: 32, textAlign: "center" }}>
            <p className="display" style={{ fontSize: 18, fontWeight: 700, marginBottom: 8 }}>Couldn't load your workspace</p>
            <p style={{ fontSize: 13, color: "var(--muted)", marginBottom: 22 }}>{loadError}</p>
            <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
              <button className="btn btn-accent" onClick={() => { setDataLoaded(false); loadAllData(); }}>Try again</button>
              <button className="btn" onClick={signOut}>Sign out</button>
            </div>
          </div>
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", height: "100vh" }}>
          <TopNav
            activeTab={activeTab}
            setActiveTab={setActiveTab}
            setCurrentFolderId={setCurrentFolderId}
            setQuery={setQuery}
            profile={profile}
            onSignOut={signOut}
            onGoHome={goHome}
          />
          <div style={{ flex: 1, overflow: "auto", minHeight: 0 }} className="scrollbar">
            {screen === "home" && (
              <HomeScreen
                folders={folders}
                videos={videos}
                activeTab={activeTab}
                setActiveTab={setActiveTab}
                currentFolderId={currentFolderId}
                setCurrentFolderId={setCurrentFolderId}
                query={query}
                setQuery={setQuery}
                createFolder={createFolder}
                renameFolder={renameFolder}
                archiveFolder={archiveFolder}
                deleteFolderRecursive={deleteFolderRecursive}
                moveFolderToFolder={moveFolderToFolder}
                reorderFolders={reorderFolders}
                addVideoFile={addVideoFile}
                deleteVideo={deleteVideo}
                archiveVideo={archiveVideo}
                renameVideo={renameVideo}
                setVideoReviewStatus={setVideoReviewStatus}
                moveVideoToFolder={moveVideoToFolder}
                reorderVideos={reorderVideos}
                openVideo={openVideo}
                profile={profile}
                onSignOut={signOut}
              />
            )}

            {screen === "video" && currentVideo && (
              <VideoScreen
                video={currentVideo}
                onBack={goHome}
                updateVideo={updateVideo}
                setVideoReviewStatus={setVideoReviewStatus}
                addNote={addNote}
                editNote={editNote}
                editNoteTime={editNoteTime}
                deleteNote={deleteNote}
                addReply={addReply}
                deleteReply={deleteReply}
              />
            )}
          </div>
        </div>
      )}
    </>
  );
}

      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');

      .app-root {
        --bg: #12141a;
        --panel: #1a1d25;
        --panel-raised: #21252f;
        --border: #2b303c;
        --text: #edeff3;

        --warm: #f2a65a;
        --violet: #a78bfa;
        --blue: #5b9dff;
        --green: #4ade80;
        --danger: #e5615a;
        --mono: 'IBM Plex Mono', ui-monospace, monospace;
        --display: 'Space Grotesk', ui-sans-serif, sans-serif;
        --body: 'Inter', ui-sans-serif, sans-serif;
        background: var(--bg);
        color: var(--text);
        font-family: var(--body);
        min-height: 100vh;
        width: 100%;
      }
      .app-root * { box-sizing: border-box; }
      .app-root ::selection { background: var(--accent-dim); color: var(--text); }
      .display { font-family: var(--display); letter-spacing: -0.01em; }
      .mono { font-family: var(--mono); }
      .btn {
        display: inline-flex; align-items: center; gap: 6px;
        background: var(--panel-raised); color: var(--text);
        border: 1px solid var(--border); border-radius: 8px;
        padding: 8px 14px; font-size: 13px; font-weight: 500;
        cursor: pointer; transition: border-color .15s, background .15s;
        font-family: var(--body);
      }
      .btn:hover { border-color: var(--accent); }
      .btn:active { transform: translateY(1px); }
      .btn-accent { background: var(--accent); color: #0b1210; border-color: var(--accent); font-weight: 600; }
      .btn-accent:hover { opacity: .9; border-color: var(--accent); }
      .btn-danger { color: var(--danger); }
      .btn-danger:hover { border-color: var(--danger); }
      .btn-ghost { background: transparent; border-color: transparent; }
      .btn-ghost:hover { background: var(--panel-raised); border-color: var(--border); }
      .icon-btn {
        display: inline-flex; align-items: center; justify-content: center;
        width: 28px; height: 28px; border-radius: 6px; border: 1px solid transparent;
        background: transparent; color: var(--muted); cursor: pointer;
      }
      .icon-btn:hover { background: var(--panel-raised); color: var(--text); border-color: var(--border); }
      input.field, textarea.field {
        background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
        color: var(--text); padding: 8px 10px; font-size: 13px; font-family: var(--body);
        outline: none; width: 100%;
      }
      input.field:focus, textarea.field:focus { border-color: var(--accent); }
      .card {
        background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      }
      .scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
      .scrollbar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }
      .scrollbar::-webkit-scrollbar-track { background: transparent; }
      a.plain { color: var(--accent); text-decoration: none; }
      .col-resizer:hover .resize-line, .col-resizer:active .resize-line { background: var(--accent); width: 2px; }
      @keyframes spin { to { transform: rotate(360deg); } }
    `}</style>
  );
}

/* ================= PUBLIC SHARE VIEW ================= */
// Rendered when someone opens a /v/{videoId} share link. No login required,
// and no way to reach anything else in the app from here — read-only, scoped
// to exactly the one video the link points to.

function PublicVideoView({ videoId }) {
  const [status, setStatus] = useState("loading"); // loading | not_found | locked | ready | error
  const [video, setVideo] = useState(null);
  const [notes, setNotes] = useState([]);
  const [passwordInput, setPasswordInput] = useState("");
  const [passwordError, setPasswordError] = useState("");
  const [checking, setChecking] = useState(false);
  const [current, setCurrent] = useState(0);
  const [duration, setDuration] = useState(0);
  const [playing, setPlaying] = useState(false);
  const [activeNoteId, setActiveNoteId] = useState(null);
  const [notesListMaxHeight, setNotesListMaxHeight] = useState(400);
  const [unlockedPassword, setUnlockedPassword] = useState("");
  const [guestName, setGuestNameState] = useState(() => getGuestName());
  const [namePromptOpen, setNamePromptOpen] = useState(false);
  const [namePromptDraft, setNamePromptDraft] = useState("");
  const [pendingReplyNoteId, setPendingReplyNoteId] = useState(null);
  const [replyingNoteId, setReplyingNoteId] = useState(null);
  const [replyDraft, setReplyDraft] = useState("");
  const [submittingReply, setSubmittingReply] = useState(false);
  const [statusSaving, setStatusSaving] = useState(false);
  const videoRef = useRef(null);
  const scrubRef = useRef(null);
  const noteRefs = useRef({});
  const notesListWrapRef = useRef(null);

  // measure exactly how much vertical space is actually left below the notes
  // list's top edge, so it scrolls internally no matter what — sidesteps any
  // ambiguity from nested flex/percentage heights
  useEffect(() => {
    const updateHeight = () => {
      if (!notesListWrapRef.current) return;
      const top = notesListWrapRef.current.getBoundingClientRect().top;
      setNotesListMaxHeight(Math.max(160, window.innerHeight - top - 24));
    };
    updateHeight();
    window.addEventListener("resize", updateHeight);
    const t = setTimeout(updateHeight, 50); // once layout settles after first paint
    return () => { window.removeEventListener("resize", updateHeight); clearTimeout(t); };
  }, [status, notes.length]);

  const load = async (password) => {
    try {
      const data = await fetchSharedVideo(videoId, password);
      if (!data.found) { setStatus("not_found"); return; }
      if (data.locked) {
        setStatus("locked");
        if (password) setPasswordError("That password isn't right.");
        return;
      }
      setVideo(data.video);
      setNotes(data.notes || []);
      setUnlockedPassword(password || "");
      setStatus("ready");
    } catch (err) {
      setStatus("error");
    }
  };

  useEffect(() => { load(null); }, [videoId]);

  const submitPassword = async (e) => {
    e.preventDefault();
    setChecking(true);
    setPasswordError("");
    await load(passwordInput);
    setChecking(false);
  };

  const togglePlay = () => {
    if (!videoRef.current) return;
    if (videoRef.current.paused) videoRef.current.play(); else videoRef.current.pause();
  };

  // seeks the video and, when jumping to a specific note (via a scrubber mark
  // or the note's own timecode button), highlights that note in the list and
  // scrolls it into view
  const seekTo = (t, noteId) => {
    if (videoRef.current) {
      videoRef.current.currentTime = t;
      // jumping to a specific note pauses so you can actually read it without
      // the video racing ahead — plain scrubbing elsewhere still resumes play
      if (noteId) videoRef.current.pause();
      else videoRef.current.play();
    }
    if (noteId) {
      setActiveNoteId(noteId);
      const el = noteRefs.current[noteId];
      if (el) el.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
  };

  const handleScrubClick = (e) => {
    if (!scrubRef.current || !duration) return;
    const rect = scrubRef.current.getBoundingClientRect();
    const pct = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
    seekTo(pct * duration);
  };

  // asks for a name once per browser before letting a visitor post their
  // first reply; after that, replying just opens the text box directly
  const startReply = (noteId) => {
    if (!guestName.trim()) {
      setPendingReplyNoteId(noteId);
      setNamePromptDraft("");
      setNamePromptOpen(true);
      return;
    }
    setReplyingNoteId(noteId);
    setReplyDraft("");
  };

  const confirmGuestName = (e) => {
    e.preventDefault();
    const name = namePromptDraft.trim();
    if (!name) return;
    setGuestName(name);
    setGuestNameState(name);
    setNamePromptOpen(false);
    if (pendingReplyNoteId) {
      setReplyingNoteId(pendingReplyNoteId);
      setReplyDraft("");
      setPendingReplyNoteId(null);
    }
  };

  const submitReply = async (noteId) => {
    if (!replyDraft.trim() || submittingReply) return;
    setSubmittingReply(true);
    try {
      await addSharedReply(video.id, noteId, replyDraft, guestName, unlockedPassword);
      setReplyDraft("");
      setReplyingNoteId(null);
      const data = await fetchSharedVideo(videoId, unlockedPassword);
      if (data.found && !data.locked) setNotes(data.notes || []);
    } catch (err) {
      alert("Couldn't post that reply — please try again.");
    } finally {
      setSubmittingReply(false);
    }
  };

  const changeStatus = async (newStatus) => {
    if (statusSaving) return;
    setStatusSaving(true);
    const prev = video.review_status;
    setVideo((v) => ({ ...v, review_status: newStatus })); // optimistic
    try {
      const result = await updateSharedVideoStatus(video.id, newStatus, unlockedPassword);
      if (!result.ok) setVideo((v) => ({ ...v, review_status: prev }));
    } catch (err) {
      setVideo((v) => ({ ...v, review_status: prev }));
    } finally {
      setStatusSaving(false);
    }
  };

  if (status === "loading") {
    return <LoadingScreen label="Loading shared video…" />;
  }

  if (status === "not_found") {
    return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <div className="card" style={{ width: "100%", maxWidth: 380, padding: 32, textAlign: "center" }}>
          <p className="display" style={{ fontSize: 18, fontWeight: 700, marginBottom: 8 }}>This link isn't available</p>
          <p style={{ fontSize: 13, color: "var(--muted)" }}>The video may have been removed, or this link isn't valid.</p>
        </div>
      </div>
    );
  }

  if (status === "error") {
    return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <div className="card" style={{ width: "100%", maxWidth: 380, padding: 32, textAlign: "center" }}>
          <p className="display" style={{ fontSize: 18, fontWeight: 700, marginBottom: 8 }}>Couldn't load this video</p>
          <p style={{ fontSize: 13, color: "var(--muted)" }}>Check your connection and try refreshing the page.</p>
        </div>
      </div>
    );
  }

  if (status === "locked") {
    return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <form onSubmit={submitPassword} className="card" style={{ width: "100%", maxWidth: 360, padding: 32 }}>
          <p className="display" style={{ fontSize: 18, fontWeight: 700, marginBottom: 4, display: "flex", alignItems: "center", gap: 8 }}>
            <Icon name="lock" size={16} color="var(--accent)" /> Password protected
          </p>
          <p style={{ fontSize: 13, color: "var(--muted)", marginBottom: 18 }}>Enter the password to view this video.</p>
          <input
            autoFocus
            type="password"
            className="field"
            style={{ marginBottom: 12 }}
            value={passwordInput}
            onChange={(e) => setPasswordInput(e.target.value)}
          />
          {passwordError && <p style={{ fontSize: 12.5, color: "var(--danger)", marginBottom: 12 }}>{passwordError}</p>}
          <button type="submit" className="btn btn-accent" disabled={checking} style={{ width: "100%", justifyContent: "center" }}>
            {checking ? "Checking…" : "View video"}
          </button>
        </form>
      </div>
    );
  }

  // status === "ready"
  const videoUrl = publicStorageUrl("videos", video.storage_path);
  const sortedNotes = [...notes].sort((a, b) => a.time - b.time);

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <div style={{ padding: "24px 20px 0", flexShrink: 0, maxWidth: 1500, width: "100%", margin: "0 auto", boxSizing: "border-box" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
          <div style={{ width: 24, height: 24, borderRadius: 6, background: "var(--accent)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
            <Icon name="play" size={12} color="#0b1210" />
          </div>
          <p className="display" style={{ fontSize: 14, fontWeight: 700 }}>Reel Notes</p>
          <span style={{ fontSize: 12, color: "var(--muted)" }}>— shared video</span>
        </div>
      </div>

      <div style={{ flex: 1, minHeight: 0, padding: "12px 20px 24px", boxSizing: "border-box" }}>
        <div style={{ maxWidth: 1500, margin: "0 auto", height: "100%" }}>
          <div style={{ display: "flex", gap: 20, flexWrap: "wrap", alignItems: "flex-start", height: "100%" }}>
            <div style={{ flex: "1 1 640px", minWidth: 280, display: "flex", flexDirection: "column" }}>
              <p className="display" style={{ fontSize: 20, fontWeight: 700, margin: "0 0 16px" }}>{video.name}</p>
              <div style={{ background: "#000", borderRadius: 12, overflow: "hidden" }}>
                <video
                ref={videoRef}
                src={videoUrl}
                playsInline
                style={{ width: "100%", maxHeight: "60vh", display: "block" }}
                onTimeUpdate={(e) => setCurrent(e.currentTarget.currentTime)}
                onLoadedMetadata={(e) => setDuration(e.currentTarget.duration)}
                onPlay={() => setPlaying(true)}
                onPause={() => setPlaying(false)}
                onClick={togglePlay}
              />
            </div>

            <div style={{ display: "flex", alignItems: "center", gap: 12, marginTop: 14 }}>
              <button
                className="icon-btn"
                style={{ width: 34, height: 34, background: "var(--panel-raised)", borderColor: "var(--border)" }}
                onClick={togglePlay}
              >
                {playing ? <Icon name="pause" size={16} /> : <Icon name="play" size={16} />}
              </button>
              <span className="mono" style={{ fontSize: 12, color: "var(--muted)", minWidth: 92 }}>
                {formatTime(current)} / {formatTime(duration)}
              </span>
              <div
                ref={scrubRef}
                onClick={handleScrubClick}
                style={{ position: "relative", flex: 1, height: 8, background: "var(--panel-raised)", borderRadius: 6, cursor: "pointer", userSelect: "none" }}
              >
                <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${duration ? (current / duration) * 100 : 0}%`, background: "var(--accent-dim)", borderRadius: 6 }} />
                <div style={{ position: "absolute", left: `${duration ? (current / duration) * 100 : 0}%`, top: "50%", transform: "translate(-50%,-50%)", width: 12, height: 12, borderRadius: "50%", background: "var(--accent)" }} />

                {/* range-note bands */}
                {sortedNotes.filter((n) => n.end_time != null).map((n) => (
                  <div
                    key={n.id + "-band"}
                    title={n.text || "Drawing"}
                    onClick={(e) => { e.stopPropagation(); seekTo(n.time, n.id); }}
                    style={{
                      position: "absolute", top: "50%", transform: "translateY(-50%)",
                      left: `${duration ? (n.time / duration) * 100 : 0}%`,
                      width: `${duration ? ((n.end_time - n.time) / duration) * 100 : 0}%`,
                      height: 14, background: n.id === activeNoteId ? "rgba(79,216,196,0.4)" : "rgba(242,166,90,0.35)",
                      border: `1px solid ${n.id === activeNoteId ? "var(--accent)" : "var(--warm)"}`,
                      borderRadius: 4, cursor: "pointer",
                    }}
                  />
                ))}

                {/* point-note ticks */}
                {sortedNotes.filter((n) => n.end_time == null).map((n) => (
                  <div
                    key={n.id}
                    title={n.text || "Drawing"}
                    onClick={(e) => { e.stopPropagation(); seekTo(n.time, n.id); }}
                    style={{
                      position: "absolute", left: `${duration ? (n.time / duration) * 100 : 0}%`, top: "50%",
                      transform: "translate(-50%,-50%)", width: n.id === activeNoteId ? 5 : 3, height: n.id === activeNoteId ? 20 : 16,
                      background: n.id === activeNoteId ? "var(--accent)" : "var(--warm)",
                      borderRadius: 2, cursor: "pointer",
                    }}
                  />
                ))}
              </div>
            </div>
          </div>

          <div style={{ flex: "1 1 340px", minWidth: 300, maxWidth: 420, display: "flex", flexDirection: "column" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 18 }}>
              <p style={{ fontSize: 13, fontWeight: 600 }}>Notes ({sortedNotes.length})</p>
              <StatusBadge status={video.review_status} onChange={changeStatus} compact />
            </div>
            {sortedNotes.length === 0 ? (
              <p style={{ fontSize: 13, color: "var(--muted)" }}>No notes on this video yet.</p>
            ) : (
              <div
                ref={notesListWrapRef}
                style={{ display: "flex", flexDirection: "column", gap: 10, maxHeight: notesListMaxHeight, overflowY: "auto", paddingRight: 4 }}
                className="scrollbar"
              >
                {sortedNotes.map((n) => (
                  <div
                    key={n.id}
                    ref={(el) => { noteRefs.current[n.id] = el; }}
                    className="card"
                    style={{
                      padding: 12,
                      borderColor: n.id === activeNoteId ? "var(--accent)" : "var(--border)",
                      outline: n.id === activeNoteId ? "1px solid var(--accent)" : "none",
                    }}
                  >
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                      <button
                        className="mono"
                        onClick={() => seekTo(n.time, n.id)}
                        style={{
                          background: "var(--panel-raised)", border: "1px solid var(--border)", color: "var(--accent)",
                          borderRadius: 6, padding: "2px 8px", fontSize: 12, cursor: "pointer",
                        }}
                      >
                        {formatTime(n.time)}{n.end_time != null ? `–${formatTime(n.end_time)}` : ""}
                      </button>
                    </div>
                    {n.author_name && <p style={{ fontSize: 11, color: "var(--muted)", marginTop: 6 }}>{n.author_name}</p>}
                    {n.drawing_path && (
                      <div style={{ width: "100%", aspectRatio: "16/9", borderRadius: 8, marginTop: 8, background: "#000", overflow: "hidden" }}>
                        <img
                          src={publicStorageUrl("drawings", n.drawing_path)}
                          style={{ width: "100%", height: "100%", objectFit: "contain" }}
                        />
                      </div>
                    )}
                    {n.text && <p style={{ fontSize: 13, marginTop: 8, lineHeight: 1.5, overflowWrap: "anywhere", wordBreak: "break-word" }}>{n.text}</p>}
                    {n.replies && n.replies.length > 0 && (
                      <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 8, paddingLeft: 12, borderLeft: "2px solid var(--border)" }}>
                        {n.replies.map((r) => (
                          <div key={r.id}>
                            {r.author_name && <p style={{ fontSize: 10.5, color: "var(--muted)", opacity: 0.8, marginBottom: 2 }}>{r.author_name}</p>}
                            <p style={{ fontSize: 12.5, color: "var(--muted)", lineHeight: 1.5, overflowWrap: "anywhere", wordBreak: "break-word" }}>{r.text}</p>
                          </div>
                        ))}
                      </div>
                    )}
                    {replyingNoteId === n.id ? (
                      <div style={{ marginTop: 10 }}>
                        <textarea
                          autoFocus
                          className="field"
                          rows={2}
                          style={{ fontSize: 12.5, resize: "vertical" }}
                          placeholder={`Reply as ${guestName}…`}
                          value={replyDraft}
                          onChange={(e) => setReplyDraft(e.target.value)}
                          onKeyDown={(e) => {
                            if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submitReply(n.id); }
                            if (e.key === "Escape") { setReplyingNoteId(null); setReplyDraft(""); }
                          }}
                        />
                        <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
                          <button className="btn btn-accent" style={{ fontSize: 12, padding: "5px 10px" }} disabled={submittingReply} onClick={() => submitReply(n.id)}>
                            {submittingReply ? "Posting…" : "Reply"}
                          </button>
                          <button className="btn btn-ghost" style={{ fontSize: 12, padding: "5px 10px" }} onClick={() => { setReplyingNoteId(null); setReplyDraft(""); }}>
                            Cancel
                          </button>
                        </div>
                      </div>
                    ) : (
                      <button
                        className="btn btn-ghost"
                        style={{ fontSize: 11.5, padding: "4px 8px", marginTop: 8, color: "var(--muted)" }}
                        onClick={() => startReply(n.id)}
                      >
                        <Icon name="corner-down-right" size={12} /> Reply
                      </button>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>
      </div>

      {namePromptOpen && (
        <div
          onClick={() => { setNamePromptOpen(false); setPendingReplyNoteId(null); }}
          style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50 }}
        >
          <form
            onClick={(e) => e.stopPropagation()}
            onSubmit={confirmGuestName}
            className="card"
            style={{ width: "100%", maxWidth: 340, padding: 24, margin: 16 }}
          >
            <p className="display" style={{ fontSize: 16, fontWeight: 700, marginBottom: 4 }}>What's your name?</p>
            <p style={{ fontSize: 12.5, color: "var(--muted)", marginBottom: 14 }}>
              So the team knows who's leaving feedback. Just asked once.
            </p>
            <input
              autoFocus
              className="field"
              placeholder="Your name"
              value={namePromptDraft}
              onChange={(e) => setNamePromptDraft(e.target.value)}
              style={{ marginBottom: 14 }}
            />
            <div style={{ display: "flex", gap: 8 }}>
              <button type="submit" className="btn btn-accent" style={{ flex: 1, justifyContent: "center" }}>Continue</button>
              <button type="button" className="btn" onClick={() => { setNamePromptOpen(false); setPendingReplyNoteId(null); }}>Cancel</button>
            </div>
          </form>
        </div>
      )}
    </div>
  );
}

        <div style={{ display: "flex", alignItems: "center", gap: 28 }}>

            active={activeTab === "home"}

          <NavTab
            active={activeTab === "archive"}
            onClick={() => go("archive")}
            icon={<Icon name="archive" size={15} />}

          />
          <div style={{ display: "flex", alignItems: "center", gap: 10, paddingLeft: 16, borderLeft: "1px solid var(--border)" }}>
            <span style={{ fontSize: 12.5, color: "var(--muted)", maxWidth: 140, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
              {profile?.display_name || "Signed in"}
