}

function HomeScreen({
  folders, videos, activeTab, setActiveTab, currentFolderId, setCurrentFolderId,
  query, setQuery, createFolder, renameFolder, archiveFolder, deleteFolderRecursive,
  moveFolderToFolder, reorderFolders, addVideoFile, deleteVideo, archiveVideo, renameVideo,
  setVideoReviewStatus, moveVideoToFolder, reorderVideos, openVideo, profile, onSignOut,
}) {
  const fileInputRef = useRef(null);
  const [dragOver, setDragOver] = useState(false);
  const [uploadError, setUploadError] = useState("");
  const [creatingFolder, setCreatingFolder] = useState(false);
  const [newFolderName, setNewFolderName] = useState("");
  const [expanded, setExpanded] = useState({});
  const [viewMode, setViewMode] = useState("tile"); // "tile" | "list"
  const [sortOrder, setSortOrder] = useState("asc"); // "asc" | "desc" | "manual"
  const [pendingDelete, setPendingDelete] = useState(null); // { type: 'folder'|'video', id, name }
  const [pendingArchive, setPendingArchive] = useState(null); // { type: 'folder'|'video', id, name }
  const [dragPayload, setDragPayload] = useState(null); // { videoIds: [], folderIds: [] }
  const [dragOverFolderId, setDragOverFolderId] = useState(null); // tree / breadcrumb / root drop targets
  const [dragOverCardKey, setDragOverCardKey] = useState(null); // in-grid card-on-card drop targets
  const [selectedIds, setSelectedIds] = useState(new Set()); // composite "video:id" / "folder:id"
  const [selectionBox, setSelectionBox] = useState(null); // { startX, startY, curX, curY }
  const gridRef = useRef(null);
  const itemRefs = useRef({});
  const selectDragRef = useRef(null);
  const [leftWidth, setLeftWidth] = useState(240);
  const resizeStartRef = useRef(null);
  const LEFT_MIN = 160;
  const LEFT_MAX = 420;

  const searching = query.trim().length > 0;

  const requestDeleteFolder = (folder) => setPendingDelete({ type: "folder", id: folder.id, name: folder.name });
  const requestDeleteVideo = (video) => setPendingDelete({ type: "video", id: video.id, name: video.name });
  const confirmPendingDelete = () => {
    if (!pendingDelete) return;
    if (pendingDelete.type === "folder") deleteFolderRecursive(pendingDelete.id);
    else deleteVideo(pendingDelete.id);
    setPendingDelete(null);
  };

  const requestArchiveFolder = (folder) => setPendingArchive({ type: "folder", id: folder.id, name: folder.name });
  const requestArchiveVideo = (video) => setPendingArchive({ type: "video", id: video.id, name: video.name });
  const confirmPendingArchive = () => {
    if (!pendingArchive) return;
    if (pendingArchive.type === "folder") archiveFolder(pendingArchive.id, true);
    else archiveVideo(pendingArchive.id, true);
    setPendingArchive(null);
  };

  const registerItemRef = (key) => (node) => {
    if (node) itemRefs.current[key] = node;
    else delete itemRefs.current[key];
  };

  // dragging a video or folder card — carries the whole current selection if the
  // dragged item is part of it, otherwise just the single item
  const buildDragPayload = (type, id) => {
    const key = `${type}:${id}`;
    if (selectedIds.has(key) && selectedIds.size > 1) {
      const videoIds = [...selectedIds].filter((k) => k.startsWith("video:")).map((k) => k.slice(6));
      const folderIds = [...selectedIds].filter((k) => k.startsWith("folder:")).map((k) => k.slice(7));
      return { videoIds, folderIds };
    }
    return type === "video" ? { videoIds: [id], folderIds: [] } : { videoIds: [], folderIds: [id] };
  };
  const lastReorderKeyRef = useRef(null);
  const handleItemDragStart = (type, id) => (e) => {
    const payload = buildDragPayload(type, id);
    e.dataTransfer.setData("text/plain", "drag");
    e.dataTransfer.effectAllowed = "move";
    // use the whole card (not just the tiny grip handle) as the floating drag image,
    // positioned so it stays right under the cursor as it moves
    const cardEl = e.currentTarget.closest(".card");
    if (cardEl) {
      const rect = cardEl.getBoundingClientRect();
      e.dataTransfer.setDragImage(cardEl, e.clientX - rect.left, e.clientY - rect.top);
    }
    lastReorderKeyRef.current = null;
    setDragPayload(payload);
  };
  const handleItemDragEnd = () => {
    setDragPayload(null);
    setDragOverFolderId(null);
    setDragOverCardKey(null);
    lastReorderKeyRef.current = null;
  };

  // drop targets that always mean "move into this folder": sidebar tree, breadcrumb, root link
  const handleFolderDragOver = (folderId) => (e) => {
    if (!dragPayload) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    setDragOverFolderId(folderId);
  };
  const handleFolderDragLeave = (folderId) => () => {
    setDragOverFolderId((cur) => (cur === folderId ? null : cur));
  };
  const handleFolderDrop = (folderId) => (e) => {
    e.preventDefault();
    if (dragPayload) {
      dragPayload.videoIds.forEach((vid) => moveVideoToFolder(vid, folderId));
      dragPayload.folderIds.forEach((fid) => moveFolderToFolder(fid, folderId));
    }
    setDragOverFolderId(null);
    setDragPayload(null);
    setSelectedIds(new Set());
  };

  // dropping directly on another folder card: reorder if it's a sibling, otherwise nest inside it
  const handleFolderCardDragOver = (folder) => (e) => {
    if (!dragPayload) return;
    e.preventDefault();
    e.stopPropagation();
    e.dataTransfer.dropEffect = "move";
    setDragOverCardKey(`folder:${folder.id}`);
  };
  const handleFolderCardDragLeave = (folder) => (e) => {
    e.stopPropagation();
    setDragOverCardKey((cur) => (cur === `folder:${folder.id}` ? null : cur));
  };
  const handleFolderCardDrop = (folder) => (e) => {
    e.preventDefault();
    e.stopPropagation();
    if (dragPayload) {
      dragPayload.videoIds.forEach((vid) => moveVideoToFolder(vid, folder.id));
      const draggedFolderIds = dragPayload.folderIds;
      if (draggedFolderIds.length > 0) {
        const allSiblings = draggedFolderIds.every((fid) => folders[fid] && folders[fid].parentId === folder.parentId);
        if (allSiblings && !draggedFolderIds.includes(folder.id)) {
          const currentIds = sortedChildFolders.map((f) => f.id);
          reorderFolders(reorderIds(currentIds, draggedFolderIds, folder.id));
          setSortOrder("manual");
        } else {
          draggedFolderIds.forEach((fid) => moveFolderToFolder(fid, folder.id));
        }
      }
    }
    setDragOverFolderId(null);
    setDragOverCardKey(null);
    setDragPayload(null);
    setSelectedIds(new Set());
  };

  // dropping (or just hovering) over another video card reorders live, so the rest
  // of the grid shifts to make room as you drag — same feel as Trello/Notion
  const handleVideoCardDragOver = (video) => (e) => {
    if (!dragPayload || dragPayload.videoIds.length === 0 || dragPayload.videoIds.includes(video.id)) return;
    e.preventDefault();
    e.stopPropagation();
    e.dataTransfer.dropEffect = "move";
    setDragOverCardKey(`video:${video.id}`);
    if (lastReorderKeyRef.current !== video.id) {
      lastReorderKeyRef.current = video.id;
      const currentIds = sortedChildVideos.map((v) => v.id);
      reorderVideos(reorderIds(currentIds, dragPayload.videoIds, video.id));
      setSortOrder("manual");
    }
  };
  const handleVideoCardDragLeave = (video) => (e) => {
    e.stopPropagation();
    setDragOverCardKey((cur) => (cur === `video:${video.id}` ? null : cur));
  };
  const handleVideoCardDrop = (video) => (e) => {
    e.preventDefault();
    e.stopPropagation();
    setDragOverCardKey(null);
    setDragPayload(null);
    setSelectedIds(new Set());
  };

  // click-and-drag rubber-band selection over empty grid/list space
  const computeSelectionFromBox = (box) => {
    if (!gridRef.current) return new Set();
    const rect = gridRef.current.getBoundingClientRect();
    const x1 = Math.min(box.startX, box.curX), x2 = Math.max(box.startX, box.curX);
    const y1 = Math.min(box.startY, box.curY), y2 = Math.max(box.startY, box.curY);
    const next = new Set();
    Object.entries(itemRefs.current).forEach(([key, node]) => {
      if (!node) return;
      const r = node.getBoundingClientRect();
      const nx1 = r.left - rect.left, nx2 = r.right - rect.left;
      const ny1 = r.top - rect.top, ny2 = r.bottom - rect.top;
      if (nx1 < x2 && nx2 > x1 && ny1 < y2 && ny2 > y1) next.add(key);
    });
    return next;
  };
  const handleGridMouseDown = (e) => {
    if (e.target !== e.currentTarget || !gridRef.current) return;
    const rect = gridRef.current.getBoundingClientRect();
    const startX = e.clientX - rect.left;
    const startY = e.clientY - rect.top;
    selectDragRef.current = true;
    setSelectionBox({ startX, startY, curX: startX, curY: startY });
    setSelectedIds(new Set());
    window.addEventListener("mousemove", handleGridMouseMove);
    window.addEventListener("mouseup", handleGridMouseUp);
  };
  const handleGridMouseMove = useCallback((e) => {
    if (!selectDragRef.current || !gridRef.current) return;
    const rect = gridRef.current.getBoundingClientRect();
    setSelectionBox((prev) => {
      const merged = prev ? { ...prev, curX: e.clientX - rect.left, curY: e.clientY - rect.top } : null;
      if (merged) setSelectedIds(computeSelectionFromBox(merged));
      return merged;
    });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);
  const handleGridMouseUp = useCallback(() => {
    selectDragRef.current = false;
    window.removeEventListener("mousemove", handleGridMouseMove);
    window.removeEventListener("mouseup", handleGridMouseUp);
    setSelectionBox(null);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);
  useEffect(() => () => {
    window.removeEventListener("mousemove", handleGridMouseMove);
    window.removeEventListener("mouseup", handleGridMouseUp);
  }, [handleGridMouseMove, handleGridMouseUp]);

  // keep the folder tree in sync: whenever the current folder changes, make sure
  // its ancestor chain (and itself, if it has children) is expanded in the sidebar
  useEffect(() => {
    if (!currentFolderId || !folders[currentFolderId]) return;
    const toExpand = { [currentFolderId]: true };
    let f = folders[currentFolderId];
    while (f && f.parentId) {
      toExpand[f.parentId] = true;
      f = folders[f.parentId];
    }
    setExpanded((e) => ({ ...e, ...toExpand }));
  }, [currentFolderId, folders]);

  const toggleExpand = (id) => setExpanded((e) => ({ ...e, [id]: !e[id] }));

  const handleResizeMouseMove = useCallback((e) => {
    if (!resizeStartRef.current) return;
    const delta = e.clientX - resizeStartRef.current.startX;
    const next = Math.min(LEFT_MAX, Math.max(LEFT_MIN, resizeStartRef.current.startWidth + delta));
    setLeftWidth(next);
  }, []);
  const handleResizeMouseUp = useCallback(() => {
    resizeStartRef.current = null;
    window.removeEventListener("mousemove", handleResizeMouseMove);
    window.removeEventListener("mouseup", handleResizeMouseUp);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);
  const handleResizeMouseDown = (e) => {
    resizeStartRef.current = { startX: e.clientX, startWidth: leftWidth };
    window.addEventListener("mousemove", handleResizeMouseMove);
    window.addEventListener("mouseup", handleResizeMouseUp);
    e.preventDefault();
  };
  useEffect(() => () => {
    window.removeEventListener("mousemove", handleResizeMouseMove);
    window.removeEventListener("mouseup", handleResizeMouseUp);
  }, [handleResizeMouseMove, handleResizeMouseUp]);

  const breadcrumb = useMemo(() => {
    const path = [];
    let f = folders[currentFolderId];
    while (f) {
      path.unshift(f);
      f = f.parentId ? folders[f.parentId] : null;
    }
    return path;
  }, [folders, currentFolderId]);

  const childFolders = Object.values(folders).filter(
    (f) => f.parentId === currentFolderId && !f.archived
  );
  const childVideos = Object.values(videos).filter((v) => v.folderId === currentFolderId && !v.archived);

  const sortedChildFolders = useMemo(() => {
    if (sortOrder === "manual") return [...childFolders].sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
    const arr = [...childFolders].sort((a, b) => a.name.localeCompare(b.name, undefined, { sensitivity: "base" }));
    return sortOrder === "desc" ? arr.reverse() : arr;
  }, [childFolders, sortOrder]);
  const sortedChildVideos = useMemo(() => {
    if (sortOrder === "manual") return [...childVideos].sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
    const arr = [...childVideos].sort((a, b) => a.name.localeCompare(b.name, undefined, { sensitivity: "base" }));
    return sortOrder === "desc" ? arr.reverse() : arr;
  }, [childVideos, sortOrder]);

  const archivedFolders = Object.values(folders).filter((f) => f.archived);
  const archivedVideos = Object.values(videos).filter((v) => v.archived);

  const searchResults = useMemo(() => {
    if (!searching) return { folders: [], videos: [] };
    const q = query.trim().toLowerCase();
    return {
      folders: Object.values(folders).filter((f) => f.id !== ROOT_ID && f.name.toLowerCase().includes(q)),
      videos: Object.values(videos).filter((v) => v.name.toLowerCase().includes(q)),
    };
  }, [query, folders, videos, searching]);

  const MAX_UPLOAD_BYTES = 50 * 1024 * 1024; // Supabase's free-plan hard cap
  const tryAddVideoFile = (file) => {
    if (file.size > MAX_UPLOAD_BYTES) {
      setUploadError(
        `"${file.name}" is ${(file.size / 1024 / 1024).toFixed(0)} MB — over the 50 MB free-plan limit. ` +
        `Compress or export it smaller (lower resolution/bitrate) and try again.`
      );
      return;
    }
    setUploadError("");
    addVideoFile(file, currentFolderId);
  };

  const handleDrop = (e) => {
    e.preventDefault();
    setDragOver(false);
    if (dragPayload) return; // this was an internal card drag, not a file drop from the OS
    const files = Array.from(e.dataTransfer.files || []);
    files.forEach(tryAddVideoFile);
  };

  const confirmNewFolder = () => {
    if (newFolderName.trim()) createFolder(currentFolderId, newFolderName.trim());
    setNewFolderName("");
    setCreatingFolder(false);
  };

  // jumps to All Projects and opens the folder a given video lives in
  const goToFolder = (folderId) => {
    setQuery("");
    setActiveTab("dashboard");
    setCurrentFolderId(folderId);
  };

  return (
    <div>
      {uploadError && (
        <div style={{
          background: "rgba(229,97,90,0.12)", borderBottom: "1px solid var(--danger)", color: "var(--danger)",
          fontSize: 12.5, padding: "10px 16px", textAlign: "center", display: "flex", alignItems: "center", justifyContent: "center", gap: 10,
        }}>
          <span>{uploadError}</span>
          <button className="icon-btn" style={{ width: 20, height: 20, color: "var(--danger)" }} onClick={() => setUploadError("")} title="Dismiss">
            <Icon name="x" size={12} />
          </button>
        </div>
      )}
      {/* top nav bar rendered persistently by App — not here */}

      <div style={{ maxWidth: 1100, margin: "0 auto", padding: "24px 24px 64px" }}>
        {/* search bar — searches across the whole app */}
        <div style={{ position: "relative", marginBottom: 28 }}>
          <Icon name="search" size={16} color="var(--muted)" style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)" }} />
          <input
            className="field"
            style={{ paddingLeft: 38, height: 42, fontSize: 14 }}
            placeholder="Search all folders and videos…"
            value={query}
            onChange={(e) => setQuery(e.target.value)}
          />
        </div>

        {searching ? (
        <SearchResults
          results={searchResults}
          folders={folders}
          onOpenFolder={(id) => { setQuery(""); setCurrentFolderId(id); setActiveTab("dashboard"); }}
          onOpenVideo={openVideo}
        />
      ) : activeTab === "home" ? (
        <HomeTabContent videos={videos} folders={folders} onOpenVideo={openVideo} onGoToFolder={goToFolder} viewMode={viewMode} setViewMode={setViewMode} setVideoReviewStatus={setVideoReviewStatus} />
      ) : activeTab === "dashboard" ? (
        <div style={{ display: "flex", alignItems: "flex-start" }}>
          <FolderSidebar
            width={leftWidth}
            folders={folders}
            videos={videos}
            currentFolderId={currentFolderId}
            expanded={expanded}
            onToggleExpand={toggleExpand}
            onSelect={(id) => setCurrentFolderId(id)}
            onOpenVideo={openVideo}
            dragOverFolderId={dragOverFolderId}
            onFolderDragOver={handleFolderDragOver}
            onFolderDragLeave={handleFolderDragLeave}
            onFolderDrop={handleFolderDrop}
          />

          <div
            onMouseDown={handleResizeMouseDown}
            className="col-resizer"
            style={{ width: 12, flexShrink: 0, alignSelf: "stretch", cursor: "col-resize", position: "relative" }}
          >
            <div className="resize-line" style={{ position: "absolute", left: "50%", top: 0, bottom: 0, width: 1, background: "var(--border)", transform: "translateX(-50%)" }} />
          </div>

          <div style={{ flex: 1, minWidth: 0 }}>
            {/* breadcrumb */}
            <div style={{ display: "flex", alignItems: "center", flexWrap: "wrap", gap: 4, marginBottom: 18, fontSize: 13, color: "var(--muted)" }}>
              <Icon name="home" size={13} />
              {breadcrumb.map((f, i) => (
                <React.Fragment key={f.id}>
                  {i > 0 && <Icon name="chevron-right" size={13} />}
                  <span
                    onClick={() => setCurrentFolderId(f.id)}
                    onDragOver={handleFolderDragOver(f.id)}
                    onDragLeave={handleFolderDragLeave(f.id)}
                    onDrop={handleFolderDrop(f.id)}
                    style={{
                      cursor: "pointer", color: i === breadcrumb.length - 1 ? "var(--text)" : "var(--muted)", fontWeight: i === breadcrumb.length - 1 ? 600 : 400,
                      padding: "2px 5px", borderRadius: 5, background: dragOverFolderId === f.id ? "var(--accent-dim)" : "transparent",
                      outline: dragOverFolderId === f.id ? "1px dashed var(--accent)" : "none",
                    }}
                  >
                    {f.name}
                  </span>
                </React.Fragment>
              ))}
            </div>

            {/* toolbar */}
            <div style={{ display: "flex", gap: 8, marginBottom: 18, alignItems: "center", justifyContent: "space-between", flexWrap: "wrap" }}>
              <div style={{ display: "flex", gap: 8 }}>
                <button className="btn" onClick={() => setCreatingFolder(true)}><Icon name="folder-plus" size={15} /> New folder</button>
                <button className="btn btn-accent" onClick={() => fileInputRef.current?.click()}><Icon name="upload" size={15} /> Add video</button>
                <input
                  ref={fileInputRef}
                  type="file"
                  accept="video/*"
                  multiple
                  style={{ display: "none" }}
                  onChange={(e) => { Array.from(e.target.files || []).forEach(tryAddVideoFile); e.target.value = ""; }}
                />
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <button
                  className="btn"
                  title={sortOrder === "manual" ? "Custom order — click to sort A–Z" : sortOrder === "asc" ? "Sorted A–Z — click for Z–A" : "Sorted Z–A — click for A–Z"}
                  onClick={() => setSortOrder((o) => (o === "manual" ? "asc" : o === "asc" ? "desc" : "asc"))}
                >
                  <Icon name="sort" size={14} /> {sortOrder === "manual" ? "Custom" : sortOrder === "asc" ? "A–Z" : "Z–A"}
                </button>
                <div style={{ display: "flex", gap: 2, background: "var(--panel)", border: "1px solid var(--border)", borderRadius: 8, padding: 2 }}>
                  <button
                    className="icon-btn"
                    title="Tile view"
                    onClick={() => setViewMode("tile")}
                    style={{ width: 30, height: 30, background: viewMode === "tile" ? "var(--panel-raised)" : "transparent", color: viewMode === "tile" ? "var(--text)" : "var(--muted)" }}
                  >
                    <Icon name="grid" size={14} />
                  </button>
                  <button
                    className="icon-btn"
                    title="List view"
                    onClick={() => setViewMode("list")}
                    style={{ width: 30, height: 30, background: viewMode === "list" ? "var(--panel-raised)" : "transparent", color: viewMode === "list" ? "var(--text)" : "var(--muted)" }}
                  >
                    <Icon name="list" size={14} />
                  </button>
                </div>
              </div>
            </div>

            {/* grid / list / dropzone */}
            <div
              onDragOver={(e) => { e.preventDefault(); if (!dragPayload) setDragOver(true); }}
              onDragLeave={() => setDragOver(false)}
              onDrop={handleDrop}
              style={{
                border: dragOver ? "2px dashed var(--accent)" : "2px dashed transparent",
                borderRadius: 14, padding: dragOver ? 12 : 0, transition: "all .15s",
                minHeight: 160,
              }}
            >
              {sortedChildFolders.length === 0 && sortedChildVideos.length === 0 && !creatingFolder ? (
                <EmptyState dragOver={dragOver} />
              ) : viewMode === "tile" ? (
                <div
                  ref={gridRef}
                  onMouseDown={handleGridMouseDown}
                  style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 14, position: "relative" }}
                >
                  {creatingFolder && (
                    <div className="card" style={{ padding: 16, position: "relative" }}>
                      <button
                        className="icon-btn"
                        onClick={() => { setCreatingFolder(false); setNewFolderName(""); }}
                        title="Cancel"
                        style={{ position: "absolute", top: 8, right: 8, width: 22, height: 22 }}
                      >
                        <Icon name="x" size={13} />
                      </button>
                      <Icon name="folder" size={22} color="var(--accent)" />
                      <div style={{ display: "flex", gap: 6, marginTop: 10, alignItems: "center" }}>
                        <input
                          autoFocus
                          className="field"
                          placeholder="Folder name"
                          value={newFolderName}
                          onChange={(e) => setNewFolderName(e.target.value)}
                          onKeyDown={(e) => { if (e.key === "Enter") confirmNewFolder(); if (e.key === "Escape") { setCreatingFolder(false); setNewFolderName(""); } }}
                        />
                        <button
                          className="icon-btn"
                          style={{ width: 36, height: 36, borderRadius: "50%", background: "var(--accent)", color: "#0b1210", border: "none", flexShrink: 0 }}
                          onClick={confirmNewFolder}
                          title="Create folder"
                        >
                          <Icon name="send" size={14} />
                        </button>
                      </div>
                    </div>
                  )}
                  {sortedChildFolders.map((f) => (
                    <div key={f.id} ref={registerItemRef(`folder:${f.id}`)}>
                      <FolderCard
                        folder={f}
                        videoCount={Object.values(videos).filter((v) => v.folderId === f.id).length}
                        onOpen={() => setCurrentFolderId(f.id)}
                        onRename={(name) => renameFolder(f.id, name)}
                        onArchive={() => requestArchiveFolder(f)}
                        onRequestDelete={() => requestDeleteFolder(f)}
                        isDragOver={dragOverCardKey === `folder:${f.id}`}
                        onDragOver={handleFolderCardDragOver(f)}
                        onDragLeave={handleFolderCardDragLeave(f)}
                        onDrop={handleFolderCardDrop(f)}
                        draggable
                        onDragStart={handleItemDragStart("folder", f.id)}
                        onDragEnd={handleItemDragEnd}
                        isSelected={selectedIds.has(`folder:${f.id}`)}
                      />
                    </div>
                  ))}
                  {sortedChildVideos.map((v) => (
                    <div key={v.id} ref={registerItemRef(`video:${v.id}`)}>
                      <VideoCard
                        video={v}
                        onOpen={() => openVideo(v.id)}
                        onRename={(name) => renameVideo(v.id, name)}
                        onArchive={() => requestArchiveVideo(v)}
                        onRequestDelete={() => requestDeleteVideo(v)}
                        onSetStatus={(s) => setVideoReviewStatus(v.id, s)}
                        onDragStart={handleItemDragStart("video", v.id)}
                        onDragEnd={handleItemDragEnd}
                        isDragging={dragPayload?.videoIds.includes(v.id)}
                        isSelected={selectedIds.has(`video:${v.id}`)}
                        isDropTarget={dragOverCardKey === `video:${v.id}`}
                        onCardDragOver={handleVideoCardDragOver(v)}
                        onCardDragLeave={handleVideoCardDragLeave(v)}
                        onCardDrop={handleVideoCardDrop(v)}
                      />
                    </div>
                  ))}
                  {selectionBox && (
                    <div
                      style={{
                        position: "absolute",
                        left: Math.min(selectionBox.startX, selectionBox.curX),
                        top: Math.min(selectionBox.startY, selectionBox.curY),
                        width: Math.abs(selectionBox.curX - selectionBox.startX),
                        height: Math.abs(selectionBox.curY - selectionBox.startY),
                        background: "rgba(79,216,196,0.15)", border: "1px solid var(--accent)",
                        borderRadius: 4, pointerEvents: "none", zIndex: 5,
                      }}
                    />
                  )}
                </div>
              ) : (
                <div
                  ref={gridRef}
                  onMouseDown={handleGridMouseDown}
                  style={{ display: "flex", flexDirection: "column", gap: 8, position: "relative" }}
                >
                  {creatingFolder && (
                    <div className="card" style={{ padding: "10px 14px", display: "flex", alignItems: "center", gap: 10 }}>
                      <Icon name="folder" size={18} color="var(--accent)" style={{ flexShrink: 0 }} />
                      <input
                        autoFocus
                        className="field"
                        style={{ flex: 1 }}
                        placeholder="Folder name"
                        value={newFolderName}
                        onChange={(e) => setNewFolderName(e.target.value)}
                        onKeyDown={(e) => { if (e.key === "Enter") confirmNewFolder(); if (e.key === "Escape") { setCreatingFolder(false); setNewFolderName(""); } }}
                      />
                      <button
                        className="icon-btn"
                        style={{ width: 32, height: 32, borderRadius: "50%", background: "var(--accent)", color: "#0b1210", border: "none", flexShrink: 0 }}
                        onClick={confirmNewFolder}
                        title="Create folder"
                      >
                        <Icon name="send" size={13} />
                      </button>
                      <button
                        className="icon-btn"
                        onClick={() => { setCreatingFolder(false); setNewFolderName(""); }}
                        title="Cancel"
                        style={{ flexShrink: 0 }}
                      >
                        <Icon name="x" size={14} />
                      </button>
                    </div>
                  )}
                  {sortedChildFolders.map((f) => (
                    <div key={f.id} ref={registerItemRef(`folder:${f.id}`)}>
                      <FolderRow
                        folder={f}
                        videoCount={Object.values(videos).filter((v) => v.folderId === f.id).length}
                        onOpen={() => setCurrentFolderId(f.id)}
                        onRename={(name) => renameFolder(f.id, name)}
                        onArchive={() => requestArchiveFolder(f)}
                        onRequestDelete={() => requestDeleteFolder(f)}
                        isDragOver={dragOverCardKey === `folder:${f.id}`}
                        onDragOver={handleFolderCardDragOver(f)}
                        onDragLeave={handleFolderCardDragLeave(f)}
                        onDrop={handleFolderCardDrop(f)}
                        draggable
                        onDragStart={handleItemDragStart("folder", f.id)}
                        onDragEnd={handleItemDragEnd}
                        isSelected={selectedIds.has(`folder:${f.id}`)}
                      />
                    </div>
                  ))}
                  {sortedChildVideos.map((v) => (
                    <div key={v.id} ref={registerItemRef(`video:${v.id}`)}>
                      <VideoListItem
                        video={v}
                        onOpen={() => openVideo(v.id)}
                        onRename={(name) => renameVideo(v.id, name)}
                        onArchive={() => requestArchiveVideo(v)}
                        onRequestDelete={() => requestDeleteVideo(v)}
                        onSetStatus={(s) => setVideoReviewStatus(v.id, s)}
                        onDragStart={handleItemDragStart("video", v.id)}
                        onDragEnd={handleItemDragEnd}
                        isDragging={dragPayload?.videoIds.includes(v.id)}
                        isSelected={selectedIds.has(`video:${v.id}`)}
                        isDropTarget={dragOverCardKey === `video:${v.id}`}
                        onCardDragOver={handleVideoCardDragOver(v)}
                        onCardDragLeave={handleVideoCardDragLeave(v)}
                        onCardDrop={handleVideoCardDrop(v)}
                      />
                    </div>
                  ))}
                  {selectionBox && (
                    <div
                      style={{
                        position: "absolute",
                        left: Math.min(selectionBox.startX, selectionBox.curX),
                        top: Math.min(selectionBox.startY, selectionBox.curY),
                        width: Math.abs(selectionBox.curX - selectionBox.startX),
                        height: Math.abs(selectionBox.curY - selectionBox.startY),
                        background: "rgba(79,216,196,0.15)", border: "1px solid var(--accent)",
                        borderRadius: 4, pointerEvents: "none", zIndex: 5,
                      }}
                    />
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      ) : (
        <ArchiveView
          archivedFolders={archivedFolders}
          archivedVideos={archivedVideos}
          onRestoreFolder={(id) => archiveFolder(id, false)}
          onRequestDeleteFolder={(f) => requestDeleteFolder(f)}
          onRestoreVideo={(id) => archiveVideo(id, false)}
          onRequestDeleteVideo={(v) => requestDeleteVideo(v)}
          onOpenVideo={openVideo}
        />
      )}
      </div>

      {pendingDelete && (
        <ConfirmDeleteModal
          itemName={pendingDelete.name}
          onCancel={() => setPendingDelete(null)}
          onConfirm={confirmPendingDelete}
        />
      )}

      {pendingArchive && (
        <ConfirmArchiveModal
          itemName={pendingArchive.name}
          onCancel={() => setPendingArchive(null)}
          onConfirm={confirmPendingArchive}
        />
      )}
    </div>
  );
}

function HomeTabContent({ videos, folders, onOpenVideo, onGoToFolder, viewMode, setViewMode, setVideoReviewStatus }) {
  const [sortMode, setSortMode] = useState("recent"); // "recent" | "asc" | "desc"

  const recent = useMemo(() => {
    const ready = Object.values(videos).filter((v) => v.status === "ready");
    let sorted;
    if (sortMode === "recent") {
      sorted = [...ready].sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
    } else {
      sorted = [...ready].sort((a, b) => a.name.localeCompare(b.name, undefined, { sensitivity: "base" }));
      if (sortMode === "desc") sorted.reverse();
    }
    return sorted.slice(0, 8);
  }, [videos, sortMode]);

  // lets the person manually drag-reorder the recent list within this session;
  // new/changed items are added to the front, existing manual order is preserved —
  // unless the sort mode itself was just changed, in which case we start fresh
  const [orderIds, setOrderIds] = useState(() => recent.map((v) => v.id));
  const [dragId, setDragId] = useState(null);
  const [dragOverId, setDragOverId] = useState(null);
  const prevSortModeRef = useRef(sortMode);

  useEffect(() => {
    const computedIds = recent.map((v) => v.id);
    if (prevSortModeRef.current !== sortMode) {
      prevSortModeRef.current = sortMode;
      setOrderIds(computedIds);
    } else {
      setOrderIds((prev) => {
        const keep = prev.filter((id) => computedIds.includes(id));
        const added = computedIds.filter((id) => !keep.includes(id));
        return [...added, ...keep];
      });
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [recent.map((v) => v.id).join(","), sortMode]);

  const videoMap = useMemo(() => Object.fromEntries(recent.map((v) => [v.id, v])), [recent]);
  const orderedVideos = orderIds.map((id) => videoMap[id]).filter(Boolean);

  const lastReorderIdRef = useRef(null);
  const handleDragStart = (id) => (e) => {
    e.dataTransfer.setData("text/plain", "drag");
    e.dataTransfer.effectAllowed = "move";
    const cardEl = e.currentTarget.closest(".card");
    if (cardEl) {
      const rect = cardEl.getBoundingClientRect();
      e.dataTransfer.setDragImage(cardEl, e.clientX - rect.left, e.clientY - rect.top);
    }
    lastReorderIdRef.current = null;
    setDragId(id);
  };
  const handleDragEnd = () => { setDragId(null); setDragOverId(null); lastReorderIdRef.current = null; };
  const handleDragOver = (id) => (e) => {
    if (!dragId || dragId === id) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    setDragOverId(id);
    if (lastReorderIdRef.current !== id) {
      lastReorderIdRef.current = id;
      setOrderIds((prev) => {
        const without = prev.filter((x) => x !== dragId);
        const idx = without.indexOf(id);
        return [...without.slice(0, idx), dragId, ...without.slice(idx)];
      });
    }
  };
  const handleDragLeave = (id) => () => setDragOverId((cur) => (cur === id ? null : cur));
  const handleDrop = (id) => (e) => {
    e.preventDefault();
    setDragId(null);
    setDragOverId(null);
  };

  if (recent.length === 0) {
    return (
      <div style={{ padding: "56px 20px", textAlign: "center", color: "var(--muted)", border: "1px dashed var(--border)", borderRadius: 14 }}>
        <Icon name="video" size={28} />
        <p style={{ marginTop: 12, fontSize: 14 }}>No videos yet.</p>
        <p style={{ fontSize: 13, marginTop: 2 }}>Add a video from All Projects to see it here.</p>
      </div>
    );
  }

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
        <p style={{ fontSize: 12, color: "var(--muted)", textTransform: "uppercase", letterSpacing: "0.06em" }}>
          Recently updated
        </p>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <div style={{ display: "flex", gap: 2, background: "var(--panel)", border: "1px solid var(--border)", borderRadius: 8, padding: 2 }}>
            <button
              className="icon-btn"
              title="Sort by most recently updated"
              onClick={() => setSortMode("recent")}
              style={{
                width: "auto", padding: "0 10px", height: 30, gap: 6,
                background: sortMode === "recent" ? "var(--panel-raised)" : "transparent",
                color: sortMode === "recent" ? "var(--text)" : "var(--muted)",
                fontSize: 12.5, fontWeight: 600,
              }}
            >
              Recent
            </button>
            <button
              className="icon-btn"
              title={sortMode === "desc" ? "Sorted Z–A — click for A–Z" : "Sort alphabetically"}
              onClick={() => setSortMode((m) => (m === "desc" ? "asc" : "desc"))}
              style={{
                width: "auto", padding: "0 10px", height: 30, gap: 6,
                background: sortMode === "asc" || sortMode === "desc" ? "var(--panel-raised)" : "transparent",
                color: sortMode === "asc" || sortMode === "desc" ? "var(--text)" : "var(--muted)",
                fontSize: 12.5, fontWeight: 600,
              }}
            >
              {sortMode === "desc" ? "Z–A" : "A–Z"}
            </button>
          </div>
          <div style={{ display: "flex", gap: 2, background: "var(--panel)", border: "1px solid var(--border)", borderRadius: 8, padding: 2 }}>
            <button
              className="icon-btn"
              title="Tile view"
              onClick={() => setViewMode("tile")}
              style={{ width: 30, height: 30, background: viewMode === "tile" ? "var(--panel-raised)" : "transparent", color: viewMode === "tile" ? "var(--text)" : "var(--muted)" }}
            >
              <Icon name="grid" size={14} />
            </button>
            <button
              className="icon-btn"
              title="List view"
              onClick={() => setViewMode("list")}
              style={{ width: 30, height: 30, background: viewMode === "list" ? "var(--panel-raised)" : "transparent", color: viewMode === "list" ? "var(--text)" : "var(--muted)" }}
            >
              <Icon name="list" size={14} />
            </button>
          </div>
        </div>
      </div>
      {viewMode === "tile" ? (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 14 }}>
          {orderedVideos.map((v) => (
            <RecentVideoCard
              key={v.id}
              video={v}
              onOpen={() => onOpenVideo(v.id)}
              onSetStatus={(s) => setVideoReviewStatus(v.id, s)}
              folderName={folders[v.folderId]?.name}
              onGoToFolder={() => onGoToFolder(v.folderId)}
              onDragStart={handleDragStart(v.id)}
              onDragEnd={handleDragEnd}
              onDragOver={handleDragOver(v.id)}
              onDragLeave={handleDragLeave(v.id)}
              onDrop={handleDrop(v.id)}
              isDragging={dragId === v.id}
              isDropTarget={dragOverId === v.id}
            />
          ))}
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {orderedVideos.map((v) => (
            <RecentVideoListItem
              key={v.id}
              video={v}
              onOpen={() => onOpenVideo(v.id)}
              onSetStatus={(s) => setVideoReviewStatus(v.id, s)}
              folderName={folders[v.folderId]?.name}
              onGoToFolder={() => onGoToFolder(v.folderId)}
              onDragStart={handleDragStart(v.id)}
              onDragEnd={handleDragEnd}
              onDragOver={handleDragOver(v.id)}
              onDragLeave={handleDragLeave(v.id)}
              onDrop={handleDrop(v.id)}
              isDragging={dragId === v.id}
              isDropTarget={dragOverId === v.id}
            />
          ))}
        </div>
      )}
    </div>
  );
}

      onMouseLeave={(e) => (e.currentTarget.style.background = "transparent")}

      <span
        style={{
          fontSize: 12.5, color: "var(--muted)",
          overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: 190, display: "inline-block",
        }}
      >
        {video.name}
      </span>

function FolderTreeNode({ folder, folders, videos, depth, currentFolderId, expanded, onToggleExpand, onSelect, onOpenVideo, dragOverFolderId, onFolderDragOver, onFolderDragLeave, onFolderDrop }) {
  const children = Object.values(folders).filter((f) => f.parentId === folder.id && !f.archived);
  const childVideos = Object.values(videos).filter((v) => v.folderId === folder.id && !v.archived && v.status === "ready");
  const hasChildren = children.length > 0 || childVideos.length > 0;
  const isExpanded = !!expanded[folder.id];
  const isActive = currentFolderId === folder.id;
  const isDragOver = dragOverFolderId === folder.id;

  return (
    <div style={{ width: "max-content", minWidth: "100%" }}>
      <div
        onClick={() => onSelect(folder.id)}
        onDragOver={onFolderDragOver(folder.id)}
        onDragLeave={onFolderDragLeave(folder.id)}
        onDrop={onFolderDrop(folder.id)}
        style={{
          display: "flex", alignItems: "center", gap: 4,
          padding: "6px 6px", paddingLeft: 6 + depth * 16, borderRadius: 6, cursor: "pointer",
          background: isDragOver ? "var(--accent-dim)" : isActive ? "var(--panel-raised)" : "transparent",
          outline: isDragOver ? "1px dashed var(--accent)" : "none",
        }}
      >
        <span
          onClick={(e) => { e.stopPropagation(); if (hasChildren) onToggleExpand(folder.id); }}
          style={{ width: 14, height: 14, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", color: "var(--muted)", cursor: hasChildren ? "pointer" : "default" }}
        >
          {hasChildren ? <Icon name={isExpanded ? "chevron-down" : "chevron-right"} size={12} /> : null}
        </span>
        <Icon name="folder" size={14} color={isActive ? "var(--accent)" : "var(--muted)"} style={{ flexShrink: 0 }} />
        <span
          title={folder.name}
          style={{
            fontSize: 13, color: isActive ? "var(--text)" : "var(--muted)", fontWeight: isActive ? 600 : 400,
            overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: 200, display: "inline-block",
          }}
        >
          {folder.name}
        </span>
      </div>
      {hasChildren && isExpanded && (
        <div>
          {children.map((c) => (
            <FolderTreeNode
              key={c.id}
              folder={c}
              folders={folders}
              videos={videos}
              depth={depth + 1}
              currentFolderId={currentFolderId}
              expanded={expanded}
              onToggleExpand={onToggleExpand}
              onSelect={onSelect}
              onOpenVideo={onOpenVideo}
              dragOverFolderId={dragOverFolderId}
              onFolderDragOver={onFolderDragOver}
              onFolderDragLeave={onFolderDragLeave}
              onFolderDrop={onFolderDrop}
            />
          ))}
          {childVideos.map((v) => (
            <VideoTreeLeaf key={v.id} video={v} depth={depth + 1} onOpenVideo={onOpenVideo} />
          ))}
        </div>
      )}
    </div>
  );
}

function EmptyState({ dragOver }) {
  return (

function ProgressRing({ percent, size = 46, stroke = 4 }) {
  const radius = (size - stroke) / 2;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (percent / 100) * circumference;
  return (
    <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
      <circle cx={size / 2} cy={size / 2} r={radius} fill="none" stroke="var(--panel-raised)" strokeWidth={stroke} />
      <circle
        cx={size / 2} cy={size / 2} r={radius} fill="none" stroke="var(--accent)" strokeWidth={stroke}
        strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round"
        style={{ transition: "stroke-dashoffset .1s linear" }}
      />
    </svg>
  );
}
