                <div
                  key={v.id}
                  onClick={() => onOpenVideo(v.id)}
                  className="card"
                  style={{ padding: "10px 14px", display: "flex", alignItems: "center", gap: 10, cursor: processing ? "default" : "pointer", opacity: processing ? 0.6 : 1 }}
                >
                  <Icon name="video" size={15} color="var(--accent)" /> <span style={{ fontSize: 13 }}>{v.name}</span>
                  {processing && <span className="mono" style={{ fontSize: 11, color: "var(--muted)", marginLeft: "auto" }}>Processing… {v.progress ?? 0}%</span>}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* ================= VIDEO SCREEN ================= */

function VideoScreen({ video, onBack, updateVideo, setVideoReviewStatus, addNote, editNote, editNoteTime, deleteNote, addReply, deleteReply }) {
  const videoRef = useRef(null);
  const scrubRef = useRef(null);
  const dragInfo = useRef(null);
  const videoWrapRef = useRef(null);
  const overlayCanvasRef = useRef(null);
  const drawingRef = useRef(false);
  const [playing, setPlaying] = useState(false);
  const [buffering, setBuffering] = useState(false);
  const [current, setCurrent] = useState(0);
  const [duration, setDuration] = useState(0);
  const [composerTime, setComposerTime] = useState(null);
  const [composerEndTime, setComposerEndTime] = useState(null);
  const [composerOpen, setComposerOpen] = useState(false);
  const [composerText, setComposerText] = useState("");
  const [composerDrawing, setComposerDrawing] = useState(null); // dataURL or null
  const [drawMode, setDrawMode] = useState(false);
  const [strokeColor, setStrokeColor] = useState("#4fd8c4");
  const [shareOpen, setShareOpen] = useState(false);
  const [dragPreview, setDragPreview] = useState(null); // { startPct, endPct } while actively dragging
  const [titleEditing, setTitleEditing] = useState(false);
  const [titleDraft, setTitleDraft] = useState(video.name);
  const [activeNoteId, setActiveNoteId] = useState(null);
  const noteRefs = useRef({});
  const composerRef = useRef(null);

  useEffect(() => {
    setTitleDraft(video.name);
    setTitleEditing(false);
  }, [video.id]);

  const saveTitle = () => {
    setTitleEditing(false);
    const trimmed = titleDraft.trim();
    if (trimmed && trimmed !== video.name) updateVideo(video.id, { name: trimmed, updatedAt: Date.now() });
    else setTitleDraft(video.name);
  };

  useEffect(() => {
    if (composerOpen) composerRef.current?.focus();
  }, [composerOpen]);

  // size + position the drawing canvas to match the video's actual visible content —
  // computed from its real pixel dimensions rather than assumed from the element's
  // box, since some browsers letterbox *inside* the box instead of shrinking it
  useEffect(() => {
    if (drawMode && overlayCanvasRef.current && videoRef.current && videoWrapRef.current) {
      const video = videoRef.current;
      const boxRect = video.getBoundingClientRect();
      const wrapRect = videoWrapRef.current.getBoundingClientRect();
      const canvas = overlayCanvasRef.current;

      const vw = video.videoWidth || boxRect.width;
      const vh = video.videoHeight || boxRect.height;
      const videoAspect = vw / vh;
      const boxAspect = boxRect.width / boxRect.height;

      let contentWidth, contentHeight, offsetX, offsetY;
      if (videoAspect > boxAspect) {
        contentWidth = boxRect.width;
        contentHeight = boxRect.width / videoAspect;
        offsetX = 0;
        offsetY = (boxRect.height - contentHeight) / 2;
      } else {
        contentHeight = boxRect.height;
        contentWidth = boxRect.height * videoAspect;
        offsetX = (boxRect.width - contentWidth) / 2;
        offsetY = 0;
      }

      canvas.width = contentWidth;
      canvas.height = contentHeight;
      canvas.style.left = `${boxRect.left - wrapRect.left + offsetX}px`;
      canvas.style.top = `${boxRect.top - wrapRect.top + offsetY}px`;
      canvas.style.width = `${contentWidth}px`;
      canvas.style.height = `${contentHeight}px`;
      const ctx = canvas.getContext("2d");
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
    }
  }, [drawMode]);

  const togglePlay = () => {
    const v = videoRef.current;
    if (!v) return;
    if (v.paused) { v.play(); setPlaying(true); } else { v.pause(); setPlaying(false); }
  };

  const onPause = () => {
    setPlaying(false);
  };

  const openComposerNow = () => {
    if (videoRef.current && !videoRef.current.paused) { videoRef.current.pause(); setPlaying(false); }
    setComposerEndTime(null);
    setComposerTime(videoRef.current?.currentTime ?? current);
    setComposerOpen(true);
  };

  const openDrawMode = () => {
    if (videoRef.current && !videoRef.current.paused) { videoRef.current.pause(); setPlaying(false); }
    if (composerTime === null) setComposerEndTime(null);
    setComposerTime((t) => (t === null ? (videoRef.current?.currentTime ?? current) : t));
    setComposerOpen(true);
    setDrawMode(true);
  };

  const getCanvasPos = (e) => {
    const rect = overlayCanvasRef.current.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  };
  const startDraw = (e) => {
    drawingRef.current = true;
    const { x, y } = getCanvasPos(e);
    const ctx = overlayCanvasRef.current.getContext("2d");
    ctx.strokeStyle = strokeColor;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x, y);
  };
  const moveDraw = (e) => {
    if (!drawingRef.current) return;
    const { x, y } = getCanvasPos(e);
    const ctx = overlayCanvasRef.current.getContext("2d");
    ctx.lineTo(x, y);
    ctx.stroke();
  };
  const endDraw = () => { drawingRef.current = false; };
  const clearCanvas = () => {
    const c = overlayCanvasRef.current;
    if (c) c.getContext("2d").clearRect(0, 0, c.width, c.height);
  };
  const cancelDrawing = () => setDrawMode(false);
  const saveDrawing = () => {
    const canvas = overlayCanvasRef.current;
    if (!canvas) return;
    try {
      const temp = document.createElement("canvas");
      temp.width = canvas.width;
      temp.height = canvas.height;
      const tctx = temp.getContext("2d");
      if (videoRef.current) {
        try { tctx.drawImage(videoRef.current, 0, 0, temp.width, temp.height); } catch (err) { /* frame not available yet */ }
      }
      tctx.drawImage(canvas, 0, 0);
      const dataUrl = temp.toDataURL("image/png");
      setComposerDrawing(dataUrl);
      setDrawMode(false);
    } catch (err) {
      console.error("Couldn't save drawing:", err);
      alert("Couldn't save the drawing — please try again. If this keeps happening, let us know.");
    }
  };

  const seekTo = (t, noteId) => {
    if (videoRef.current) {
      videoRef.current.currentTime = t;
      // jumping to a specific note pauses so you can actually read it without
      // the video racing ahead — plain scrubbing/dragging elsewhere is unaffected
      if (noteId) videoRef.current.pause();
    }
    setCurrent(t);
    if (noteId) {
      setActiveNoteId(noteId);
      const el = noteRefs.current[noteId];
      if (el) el.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
  };

  const pctFromClientX = (clientX) => {
    const rect = scrubRef.current.getBoundingClientRect();
    return Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
  };
  const durationNow = () => videoRef.current?.duration || duration || 0;

  const handleWindowMouseMove = useCallback((e) => {
    if (!dragInfo.current) return;
    const pct = pctFromClientX(e.clientX);
    setDragPreview({ startPct: dragInfo.current.startPct, endPct: pct });
  }, []);

  const handleWindowMouseUp = useCallback((e) => {
    if (!dragInfo.current) return;
    const startPct = dragInfo.current.startPct;
    const endPct = pctFromClientX(e.clientX);
    const movedPx = Math.abs(e.clientX - dragInfo.current.startX);
    window.removeEventListener("mousemove", handleWindowMouseMove);
    window.removeEventListener("mouseup", handleWindowMouseUp);
    dragInfo.current = null;
    setDragPreview(null);

    const dur = durationNow();
    if (movedPx < 6) {
      // a simple click — just seek, never touches the note mark or composer
      seekTo(startPct * dur);
    } else {
      const t1 = startPct * dur;
      const t2 = endPct * dur;
      const start = Math.min(t1, t2);
      const end = Math.max(t1, t2);
      if (videoRef.current && !videoRef.current.paused) { videoRef.current.pause(); setPlaying(false); }
      seekTo(start);
      setComposerTime(start);
      setComposerEndTime(end);
      setComposerOpen(true);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // double-clicking the bar drops (or moves) the pending note mark and opens
  // the answer box automatically — doesn't force a pause, so if the video was
  // playing it keeps going while you write
  const handleScrubDoubleClick = (e) => {
    if (drawMode) return;
    const pct = pctFromClientX(e.clientX);
    setComposerTime(pct * durationNow());
    setComposerEndTime(null);
    setComposerOpen(true);
  };

  const handleScrubMouseDown = (e) => {
    const pct = pctFromClientX(e.clientX);
    dragInfo.current = { startX: e.clientX, startPct: pct };
    setDragPreview({ startPct: pct, endPct: pct });
    window.addEventListener("mousemove", handleWindowMouseMove);
    window.addEventListener("mouseup", handleWindowMouseUp);
  };

  useEffect(() => () => {
    window.removeEventListener("mousemove", handleWindowMouseMove);
    window.removeEventListener("mouseup", handleWindowMouseUp);
  }, [handleWindowMouseMove, handleWindowMouseUp]);

  const submitNote = () => {
    if ((!composerText.trim() && !composerDrawing) || composerTime === null) return;
    addNote(video.id, composerTime, composerText, composerEndTime, composerDrawing);
    setComposerText("");
    setComposerDrawing(null);
    setComposerTime(null);
    setComposerEndTime(null);
    setComposerOpen(false);
  };
  const cancelComposer = () => {
    setComposerTime(null);
    setComposerEndTime(null);
    setComposerText("");
    setComposerDrawing(null);
    setComposerOpen(false);
  };

  const sortedNotes = [...video.notes].sort((a, b) => a.time - b.time);

  return (
    <div style={{ display: "flex", height: "100%", minHeight: "100%", width: "100%" }}>
      {/* main column */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "20px 24px", overflowY: "auto" }} className="scrollbar">
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <button className="icon-btn" onClick={onBack}><Icon name="arrow-left" size={17} /></button>
            {titleEditing ? (
              <input
                autoFocus
                className="field"
                style={{ fontSize: 16, fontWeight: 600, padding: "4px 8px", width: 320 }}
                value={titleDraft}
                onChange={(e) => setTitleDraft(e.target.value)}
                onKeyDown={(e) => { if (e.key === "Enter") saveTitle(); if (e.key === "Escape") { setTitleDraft(video.name); setTitleEditing(false); } }}
                onBlur={saveTitle}
              />
            ) : (
              <div
                onClick={() => { setTitleDraft(video.name); setTitleEditing(true); }}
                style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}
                title="Click to rename"
              >
                <p className="display" style={{ fontSize: 16, fontWeight: 600 }}>{video.name}</p>
                <Icon name="pencil" size={13} color="var(--muted)" />
              </div>
            )}
          </div>
          <button className="btn btn-accent" onClick={() => setShareOpen(true)}><Icon name="share" size={14} /> Share</button>
        </div>

        <div ref={videoWrapRef} style={{ background: "#000", borderRadius: 12, overflow: "hidden", position: "relative" }}>
          <video
            ref={videoRef}
            src={video.url}
            preload="auto"
            playsInline
            crossOrigin="anonymous"
            style={{ width: "100%", maxHeight: "62vh", display: "block" }}
            onTimeUpdate={(e) => setCurrent(e.currentTarget.currentTime)}
            onLoadedMetadata={(e) => setDuration(e.currentTarget.duration)}
            onPlay={() => setPlaying(true)}
            onPause={onPause}
            onWaiting={() => setBuffering(true)}
            onStalled={() => setBuffering(true)}
            onPlaying={() => setBuffering(false)}
            onCanPlay={() => setBuffering(false)}
            onError={(e) => console.error("Video playback error:", e.currentTarget.error)}
            onClick={drawMode ? undefined : togglePlay}
          />
          {buffering && !drawMode && (
            <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>
              <div style={{ width: 34, height: 34, borderRadius: "50%", border: "3px solid rgba(255,255,255,0.25)", borderTopColor: "#fff", animation: "spin 0.8s linear infinite" }} />
            </div>
          )}
          {drawMode && (
            <canvas
              ref={overlayCanvasRef}
              style={{ position: "absolute", cursor: "crosshair", touchAction: "none" }}
              onMouseDown={startDraw}
              onMouseMove={moveDraw}
              onMouseUp={endDraw}
              onMouseLeave={endDraw}
            />
          )}
        </div>

        {drawMode && (
          <div className="card" style={{ padding: 10, marginTop: 10, display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
            <span style={{ fontSize: 12, color: "var(--muted)" }}>Draw on this frame — {formatTime(composerTime ?? current)}</span>
            <div style={{ display: "flex", gap: 6 }}>
              {["#4fd8c4", "#f2a65a", "#e5615a", "#ffffff"].map((c) => (
                <button
                  key={c}
                  onClick={() => setStrokeColor(c)}
                  title="Stroke color"
                  style={{
                    width: 20, height: 20, borderRadius: "50%", background: c, cursor: "pointer",
                    border: strokeColor === c ? "2px solid var(--text)" : "2px solid transparent",
                  }}
                />
              ))}
            </div>
            <button className="btn btn-ghost" onClick={clearCanvas}>Clear</button>
            <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
              <button className="btn btn-ghost" onClick={cancelDrawing}>Cancel</button>
              <button className="btn btn-accent" onClick={saveDrawing}>Save drawing</button>
            </div>
          </div>
        )}

        {/* custom controls + scrubber with note markers */}
        <div style={{ marginTop: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <button className="icon-btn" style={{ width: 34, height: 34, background: "var(--panel-raised)", borderColor: "var(--border)" }} onClick={togglePlay}>
              {playing ? <Icon name="pause" size={16} /> : <Icon name="play" size={16} />}
            </button>
            <span className="mono" style={{ fontSize: 12, color: "var(--muted)", minWidth: 92 }}>
              {formatTime(current)} / {formatTime(duration)}
            </span>
            <div
              ref={scrubRef}
              onMouseDown={handleScrubMouseDown}
              onDoubleClick={handleScrubDoubleClick}
              style={{ position: "relative", flex: 1, height: 8, background: "var(--panel-raised)", borderRadius: 6, cursor: "pointer", userSelect: "none" }}
            >
              <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${duration ? (current / duration) * 100 : 0}%`, background: "var(--accent-dim)", borderRadius: 6 }} />
              <div style={{ position: "absolute", left: `${duration ? (current / duration) * 100 : 0}%`, top: "50%", transform: "translate(-50%,-50%)", width: 12, height: 12, borderRadius: "50%", background: "var(--accent)" }} />

              {/* range-note bands */}
              {sortedNotes.filter((n) => n.endTime != null).map((n) => (
                <div
                  key={n.id + "-band"}
                  title={`${formatTime(n.time)}–${formatTime(n.endTime)} — ${n.text || "Drawing"}`}
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={(e) => { e.stopPropagation(); seekTo(n.time, n.id); }}
                  style={{
                    position: "absolute", top: "50%", transform: "translateY(-50%)",
                    left: `${duration ? (n.time / duration) * 100 : 0}%`,
                    width: `${duration ? ((n.endTime - n.time) / duration) * 100 : 0}%`,
                    height: 14, background: "rgba(242,166,90,0.35)", border: "1px solid var(--warm)",
                    borderRadius: 4, cursor: "pointer",
                  }}
                />
              ))}

              {/* point-note ticks */}
              {sortedNotes.filter((n) => n.endTime == null).map((n) => (
                <div
                  key={n.id}
                  title={`${formatTime(n.time)} — ${n.text || "Drawing"}`}
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={(e) => { e.stopPropagation(); seekTo(n.time, n.id); }}
                  style={{
                    position: "absolute", left: `${duration ? (n.time / duration) * 100 : 0}%`, top: "50%",
                    transform: "translate(-50%,-50%)", width: 3, height: 16, background: "var(--warm)",
                    borderRadius: 2, cursor: "pointer",
                  }}
                />
              ))}

              {/* marker for a note that's being drafted but not saved yet — dashed, not solid,
                  and a different color from the orange saved-note markers */}
              {composerTime !== null && (
                composerEndTime != null ? (
                  <div
                    title={`${formatTime(composerTime)}–${formatTime(composerEndTime)} — note not saved yet`}
                    style={{
                      position: "absolute", top: "50%", transform: "translateY(-50%)",
                      left: `${duration ? (composerTime / duration) * 100 : 0}%`,
                      width: `${duration ? ((composerEndTime - composerTime) / duration) * 100 : 0}%`,
                      height: 14, background: "rgba(79,216,196,0.18)", border: "1.5px dashed var(--accent)",
                      borderRadius: 4, pointerEvents: "none", zIndex: 4,
                    }}
                  />
                ) : (
                  <div
                    title={`${formatTime(composerTime)} — note not saved yet`}
                    style={{
                      position: "absolute", left: `${duration ? (composerTime / duration) * 100 : 0}%`, top: "50%",
                      transform: "translate(-50%,-50%)", width: 11, height: 11, borderRadius: "50%",
                      background: "var(--bg)", border: "2px dashed var(--accent)", pointerEvents: "none", zIndex: 4,
                    }}
                  />
                )
              )}

              {/* live drag-selection preview */}
              {dragPreview && (
                <>
                  <div
                    style={{
                      position: "absolute", top: "50%", transform: "translateY(-50%)",
                      left: `${Math.min(dragPreview.startPct, dragPreview.endPct) * 100}%`,
                      width: `${Math.abs(dragPreview.endPct - dragPreview.startPct) * 100}%`,
                      height: 14, background: "rgba(79,216,196,0.3)", border: "1px solid var(--accent)",
                      borderRadius: 4, pointerEvents: "none",
                    }}
                  />
                  <div
                    className="mono"
                    style={{
                      position: "absolute", left: `${dragPreview.startPct * 100}%`, bottom: "calc(100% + 10px)",
                      transform: "translateX(-50%)", background: "var(--panel-raised)", border: "1px solid var(--accent)",
                      color: "var(--accent)", fontSize: 11, fontWeight: 600, padding: "3px 7px", borderRadius: 5,
                      whiteSpace: "nowrap", pointerEvents: "none", zIndex: 5,
                    }}
                  >
                    {formatTime(dragPreview.startPct * durationNow())}
                  </div>
                  <div
                    className="mono"
                    style={{
                      position: "absolute", left: `${dragPreview.endPct * 100}%`, bottom: "calc(100% + 10px)",
                      transform: "translateX(-50%)", background: "var(--accent)", border: "1px solid var(--accent)",
                      color: "#0b1210", fontSize: 11, fontWeight: 700, padding: "3px 7px", borderRadius: 5,
                      whiteSpace: "nowrap", pointerEvents: "none", zIndex: 6,
                    }}
                  >
                    {formatTime(dragPreview.endPct * durationNow())}
                  </div>
                </>
              )}
            </div>
            <button className="btn" onClick={openDrawMode}><Icon name="pencil" size={14} /> Draw</button>
            <button className="btn" onClick={openComposerNow}><Icon name="plus" size={14} /> Add note</button>
          </div>
          <p style={{ fontSize: 12, color: "var(--muted)", marginTop: 8 }}>
            Tip: pause the video to note a moment, drag across the bar to note a range, or draw right on the frame.
          </p>
        </div>

        {composerOpen && !drawMode && (
          <div className="card" style={{ padding: 14, marginTop: 16 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
              <span className="mono" style={{ background: "var(--accent-dim)", color: "var(--accent)", padding: "2px 8px", borderRadius: 6, fontSize: 12, fontWeight: 600 }}>
                {composerEndTime != null ? `${formatTime(composerTime)} – ${formatTime(composerEndTime)}` : formatTime(composerTime)}
              </span>
              <span style={{ fontSize: 12, color: "var(--muted)" }}>
                {composerEndTime != null ? "New note for this range" : "New note at this timecode"}
              </span>
            </div>
            {composerDrawing && (
              <div style={{ position: "relative", marginBottom: 8 }}>
                <div style={{ width: "100%", aspectRatio: "16/9", borderRadius: 8, border: "1px solid var(--border)", background: "#000", overflow: "hidden" }}>
                  <img src={composerDrawing} alt="Drawing" style={{ width: "100%", height: "100%", objectFit: "contain", display: "block" }} />
                </div>
                <button
                  className="icon-btn"
                  style={{ position: "absolute", top: 6, right: 6, background: "rgba(0,0,0,0.6)", color: "#fff" }}
                  onClick={() => setComposerDrawing(null)}
                  title="Remove drawing"
                >
                  <Icon name="x" size={12} />
                </button>
              </div>
            )}
            <button className="btn btn-ghost" style={{ fontSize: 12, marginBottom: 8 }} onClick={openDrawMode}>
              <Icon name="pencil" size={12} /> {composerDrawing ? "Redraw" : "Draw on this frame"}
            </button>
            <textarea
              ref={composerRef}
              className="field"
              rows={2}
              placeholder={composerDrawing ? "Add a caption (optional)…" : "What needs attention here? (Enter to save, Shift+Enter for a new line)"}
              value={composerText}
              onChange={(e) => setComposerText(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submitNote(); } if (e.key === "Escape") cancelComposer(); }}
            />
            <div style={{ display: "flex", gap: 8, marginTop: 8, justifyContent: "flex-end" }}>
              <button className="btn btn-ghost" onClick={cancelComposer}>Cancel</button>
              <button className="btn btn-accent" onClick={submitNote}>Enter ↵ &nbsp;Add note</button>
            </div>
          </div>
        )}
      </div>

      {/* right sidebar: notes */}
      <div style={{ width: 310, borderLeft: "1px solid var(--border)", display: "flex", flexDirection: "column", background: "var(--panel)" }}>
        <div style={{ padding: "18px 18px 12px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8 }}>
          <p className="display" style={{ fontSize: 14, fontWeight: 600, display: "flex", alignItems: "center", gap: 8 }}>
            <Icon name="message" size={15} color="var(--accent)" /> Notes ({sortedNotes.length})
          </p>
          <StatusBadge status={video.reviewStatus} onChange={(s) => setVideoReviewStatus(video.id, s)} />
        </div>
        <div style={{ flex: 1, overflowY: "auto", padding: 14 }} className="scrollbar">
          {sortedNotes.length === 0 ? (
            <p style={{ fontSize: 13, color: "var(--muted)", padding: "20px 4px" }}>No notes yet. Pause the video, hit "Add note", or draw right on the frame to leave feedback at a timecode.</p>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {sortedNotes.map((n) => (
                <div key={n.id} ref={(el) => { noteRefs.current[n.id] = el; }}>
                  <NoteCard
                    note={n}
                    onSeek={() => seekTo(n.time, n.id)}
                    onEdit={(text) => editNote(video.id, n.id, text)}
                    onEditTime={(time, endTime) => editNoteTime(video.id, n.id, time, endTime)}
                    onDelete={() => deleteNote(video.id, n.id)}
                    onReply={(text) => addReply(video.id, n.id, text)}
                    onDeleteReply={(rid) => deleteReply(video.id, n.id, rid)}
                    isActive={n.id === activeNoteId}
                  />
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {shareOpen && <ShareModal video={video} updateVideo={updateVideo} onClose={() => setShareOpen(false)} />}
    </div>
  );
}

function NoteCard({ note, onSeek, onEdit, onEditTime, onDelete, onReply, onDeleteReply, isActive }) {
  const [editing, setEditing] = useState(false);
  const [text, setText] = useState(note.text);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [replying, setReplying] = useState(false);
  const [replyText, setReplyText] = useState("");
  const [editingTime, setEditingTime] = useState(false);
  const [timeInput, setTimeInput] = useState(formatTime(note.time));
  const [endTimeInput, setEndTimeInput] = useState(note.endTime != null ? formatTime(note.endTime) : "");

  const saveEdit = () => {
    if (text.trim()) onEdit(text.trim());
    setEditing(false);
  };
  const submitReply = () => {
    if (!replyText.trim()) return;
    onReply(replyText);
    setReplyText("");
    setReplying(false);
  };

  const startEditingTime = () => {
    setTimeInput(formatTime(note.time));
    setEndTimeInput(note.endTime != null ? formatTime(note.endTime) : "");
    setEditingTime(true);
  };
  const cancelEditingTime = () => setEditingTime(false);
  const saveTime = () => {
    const newStart = parseTimeToSeconds(timeInput);
    if (newStart == null) { setEditingTime(false); return; }
    let newEnd = null;
    if (note.endTime != null) {
      const parsedEnd = parseTimeToSeconds(endTimeInput);
      newEnd = parsedEnd != null && parsedEnd > newStart ? parsedEnd : note.endTime;
    }
    onEditTime(newStart, newEnd);
    setEditingTime(false);
  };

  return (
    <div
      className="card"
      style={{
        padding: 12,
        borderColor: isActive ? "var(--accent)" : "var(--border)",
        outline: isActive ? "1px solid var(--accent)" : "none",
      }}
    >
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        {editingTime ? (
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <input
              autoFocus
              className="field mono"
              style={{ width: note.endTime != null ? 58 : 72, padding: "3px 6px", fontSize: 12 }}
              value={timeInput}
              onChange={(e) => setTimeInput(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") saveTime(); if (e.key === "Escape") cancelEditingTime(); }}
            />
            {note.endTime != null && (
              <>
                <span style={{ fontSize: 11, color: "var(--muted)" }}>–</span>
                <input
                  className="field mono"
                  style={{ width: 58, padding: "3px 6px", fontSize: 12 }}
                  value={endTimeInput}
                  onChange={(e) => setEndTimeInput(e.target.value)}
                  onKeyDown={(e) => { if (e.key === "Enter") saveTime(); if (e.key === "Escape") cancelEditingTime(); }}
                />
              </>
            )}
            <button className="icon-btn" style={{ width: 22, height: 22 }} onClick={saveTime} title="Save timecode"><Icon name="check" size={12} /></button>
            <button className="icon-btn" style={{ width: 22, height: 22 }} onClick={cancelEditingTime} title="Cancel"><Icon name="x" size={12} /></button>
          </div>
        ) : (
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <button
              onClick={onSeek}
              className="mono"
              style={{ background: "var(--accent-dim)", color: "var(--accent)", border: "none", padding: "3px 8px", borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: "pointer" }}
              title="Jump to this point in the video"
            >
              {note.endTime != null ? `${formatTime(note.time)} – ${formatTime(note.endTime)}` : formatTime(note.time)}
            </button>
            <button className="icon-btn" style={{ width: 20, height: 20 }} onClick={startEditingTime} title="Edit timecode">
              <Icon name="pencil" size={11} />
            </button>
          </div>
        )}
        <div style={{ display: "flex", gap: 2 }}>
          <button className="icon-btn" onClick={() => setEditing((e) => !e)}><Icon name="pencil" size={13} /></button>
          <button className="icon-btn" onClick={() => setConfirmDelete(true)} title="Delete note"><Icon name="trash" size={13} /></button>
        </div>
      </div>
      {note.authorName && (
        <p style={{ fontSize: 11, color: "var(--muted)", marginTop: 4 }}>{note.authorName}</p>
      )}

      {editing ? (
        <div style={{ marginTop: 8 }}>
          <textarea
            autoFocus
            className="field"
            rows={2}
            value={text}
            onChange={(e) => setText(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); saveEdit(); } }}
          />
          <div style={{ display: "flex", gap: 6, marginTop: 6, justifyContent: "flex-end" }}>
            <button className="btn btn-ghost" onClick={() => { setEditing(false); setText(note.text); }}>Cancel</button>
            <button className="btn btn-accent" onClick={saveEdit}>Save</button>
          </div>
        </div>
      ) : (
        <>
          {note.drawing && (
            <div style={{ width: "100%", aspectRatio: "16/9", borderRadius: 8, border: "1px solid var(--border)", marginTop: 8, background: "#000", overflow: "hidden" }}>
              <img
                src={note.drawing}
                alt="Drawing on frame"
                style={{ width: "100%", height: "100%", objectFit: "contain", display: "block" }}
              />
            </div>
          )}
          {note.text && <p style={{ fontSize: 13, marginTop: 8, lineHeight: 1.5, overflowWrap: "anywhere", wordBreak: "break-word" }}>{linkifyText(note.text)}</p>}
        </>
      )}

      {/* replies */}
      {note.replies.length > 0 && (
        <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 8, paddingLeft: 12, borderLeft: "2px solid var(--border)" }}>
          {note.replies.map((r) => (
            <div key={r.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 6 }}>
              <div>
                {r.authorName && <p style={{ fontSize: 10.5, color: "var(--muted)", opacity: 0.8, marginBottom: 2 }}>{r.authorName}</p>}
                <p style={{ fontSize: 12.5, color: "var(--muted)", lineHeight: 1.5, overflowWrap: "anywhere", wordBreak: "break-word" }}>{linkifyText(r.text)}</p>
              </div>
              <button className="icon-btn" style={{ width: 22, height: 22, flexShrink: 0 }} onClick={() => onDeleteReply(r.id)}><Icon name="x" size={12} /></button>
            </div>
          ))}
        </div>
      )}

      {replying ? (
        <div style={{ marginTop: 10 }}>
          <textarea
            autoFocus
            className="field"
            rows={1}
            placeholder="Write a reply…"
            value={replyText}
            onChange={(e) => setReplyText(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submitReply(); } }}
          />
          <div style={{ display: "flex", gap: 6, marginTop: 6, justifyContent: "flex-end" }}>
            <button className="btn btn-ghost" onClick={() => setReplying(false)}>Cancel</button>
            <button className="btn btn-accent" onClick={submitReply}>Reply</button>
          </div>
        </div>
      ) : (
        <button
          className="btn btn-ghost"
          style={{ marginTop: 8, padding: "4px 8px", fontSize: 12, color: "var(--muted)" }}
          onClick={() => setReplying(true)}
        >
          <Icon name="corner-down-right" size={12} /> Reply
        </button>
      )}

      {confirmDelete && (
        <div
          onClick={() => setConfirmDelete(false)}
          style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 70 }}
        >
          <div onClick={(e) => e.stopPropagation()} className="card" style={{ width: 280, padding: 20, textAlign: "center" }}>
            <p style={{ fontSize: 14, fontWeight: 600, marginBottom: 16 }}>Delete note?</p>
            <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
              <button
                className="icon-btn"
                style={{ width: 36, height: 36, border: "1px solid var(--border)" }}
                onClick={() => setConfirmDelete(false)}
                title="Cancel"
              >
                <Icon name="x" size={16} />
              </button>
              <button
                className="icon-btn"
                style={{ width: 36, height: 36, background: "var(--danger)", color: "#fff", border: "none" }}
                onClick={() => { onDelete(); setConfirmDelete(false); }}
                title="Delete"
              >
                <Icon name="check" size={16} />
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ================= SHARE MODAL ================= */

function ShareModal({ video, updateVideo, onClose }) {
  const [locked, setLocked] = useState(video.locked || false);
  const [password, setPassword] = useState(video.password || "");
  const [copiedLink, setCopiedLink] = useState(false);
  const [copiedBoth, setCopiedBoth] = useState(false);

  const link = `${window.location.origin}/v/${video.id}`;

  const generate = () => {
    const p = makePassword();
    setPassword(p);
    updateVideo(video.id, { password: p, locked: true });
    setLocked(true);
  };

  const toggleLock = (val) => {
    setLocked(val);
    if (val && !password) {
      const p = makePassword();
      setPassword(p);
      updateVideo(video.id, { locked: val, password: p });
    } else {
      updateVideo(video.id, { locked: val, password });
    }
  };

  const onPasswordChange = (v) => {
    setPassword(v);
    updateVideo(video.id, { password: v });
  };

  const doCopyLink = async () => {
    const ok = await copyText(link);
    if (ok) { setCopiedLink(true); setTimeout(() => setCopiedLink(false), 1800); }
  };
  const doCopyBoth = async () => {
    const ok = await copyText(`${link}\nPassword: ${password}`);
    if (ok) { setCopiedBoth(true); setTimeout(() => setCopiedBoth(false), 1800); }
  };

  return (
    <div
      onClick={onClose}
      style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50 }}
    >
      <div onClick={(e) => e.stopPropagation()} className="card" style={{ width: 420, padding: 22 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <p className="display" style={{ fontSize: 16, fontWeight: 600, display: "flex", alignItems: "center", gap: 8 }}>
            <Icon name="share" size={16} color="var(--accent)" /> Share this video
          </p>
          <button className="icon-btn" onClick={onClose}><Icon name="x" size={16} /></button>
        </div>
        <p style={{ fontSize: 12.5, color: "var(--muted)", marginBottom: 14 }}>
          Anyone with the link can view "{video.name}" and its timecoded notes.
        </p>

        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 12px", background: "var(--panel-raised)", borderRadius: 8, marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <Icon name="lock" size={14} color={locked ? "var(--accent)" : "var(--muted)"} />
            <span style={{ fontSize: 13 }}>Password protect this link</span>
          </div>
          <Toggle checked={locked} onChange={toggleLock} />
        </div>

        {locked && (
          <div style={{ marginBottom: 14 }}>
            <div style={{ display: "flex", gap: 8 }}>
              <input className="field mono" value={password} onChange={(e) => onPasswordChange(e.target.value)} placeholder="Set a password" />
              <button className="btn" onClick={generate}><Icon name="wand" size={13} /> Generate for me</button>
            </div>
          </div>
        )}

        <div style={{ marginBottom: 16 }}>
          <p style={{ fontSize: 11, color: "var(--muted)", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 6 }}>Share link</p>
          <div className="mono" style={{ background: "var(--panel-raised)", border: "1px solid var(--border)", borderRadius: 8, padding: "9px 12px", fontSize: 12.5, wordBreak: "break-all" }}>
            {link}
          </div>
        </div>

        <div style={{ display: "flex", gap: 8 }}>
          <button className="btn" style={{ flex: 1, justifyContent: "center" }} onClick={doCopyLink}>
            {copiedLink ? <Icon name="check" size={14} /> : <Icon name="copy" size={14} />} {copiedLink ? "Copied" : "Copy link"}
          </button>
          {locked && (
            <button className="btn btn-accent" style={{ flex: 1, justifyContent: "center" }} onClick={doCopyBoth}>
              {copiedBoth ? <Icon name="check" size={14} /> : <Icon name="copy" size={14} />} {copiedBoth ? "Copied" : "Copy link + password"}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

function ConfirmDeleteModal({ itemName, onConfirm, onCancel }) {
  return (
    <div
      onClick={onCancel}
      style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 60 }}
    >
      <div onClick={(e) => e.stopPropagation()} className="card" style={{ width: 380, padding: 22 }}>
        <div style={{ display: "flex", alignItems: "flex-start", gap: 12, marginBottom: 6 }}>
          <div style={{ width: 34, height: 34, borderRadius: "50%", background: "rgba(229,97,90,0.15)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
            <Icon name="trash" size={16} color="var(--danger)" />
          </div>
          <p className="display" style={{ fontSize: 15, fontWeight: 600, marginTop: 6 }}>Are you sure you want to delete forever?</p>
        </div>
        <p style={{ fontSize: 13, color: "var(--muted)", marginBottom: 20, marginLeft: 46 }}>
          "{itemName}" will be permanently removed. This can't be undone.
        </p>
        <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
          <button className="btn btn-ghost" onClick={onCancel}>Cancel</button>
          <button
            className="btn"
            style={{ background: "var(--danger)", borderColor: "var(--danger)", color: "#fff", fontWeight: 600 }}
            onClick={onConfirm}
          >
            Delete
          </button>
        </div>
      </div>
    </div>
  );
}

function ConfirmArchiveModal({ itemName, onConfirm, onCancel }) {
  return (
    <div
      onClick={onCancel}
      style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 60 }}
    >
      <div onClick={(e) => e.stopPropagation()} className="card" style={{ width: 380, padding: 22 }}>
        <div style={{ display: "flex", alignItems: "flex-start", gap: 12, marginBottom: 6 }}>
          <div style={{ width: 34, height: 34, borderRadius: "50%", background: "var(--accent-dim)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
            <Icon name="archive" size={16} color="var(--accent)" />
          </div>
          <p className="display" style={{ fontSize: 15, fontWeight: 600, marginTop: 6 }}>Are you sure you want to archive?</p>
        </div>
        <p style={{ fontSize: 13, color: "var(--muted)", marginBottom: 20, marginLeft: 46 }}>
          "{itemName}" will be moved to the archive. You can restore it any time.
        </p>
        <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
          <button className="btn btn-ghost" onClick={onCancel}>Cancel</button>
          <button className="btn btn-accent" onClick={onConfirm}>Archive</button>
        </div>
      </div>
    </div>
  );
}

function Toggle({ checked, onChange }) {
  return (
    <div
      onClick={() => onChange(!checked)}
      style={{
        width: 38, height: 22, borderRadius: 20, cursor: "pointer",
        background: checked ? "var(--accent)" : "var(--border)",
        position: "relative", transition: "background .15s", flexShrink: 0,
      }}
    >
      <div style={{
        position: "absolute", top: 2, left: checked ? 18 : 2, width: 18, height: 18, borderRadius: "50%",
        background: "#0b1210", transition: "left .15s",
      }} />
    </div>
  );
}

function Root() {
  const match = window.location.pathname.match(/^\/v\/([0-9a-fA-F-]{36})\/?$/);
  return (
    <div className="app-root">
      <GlobalStyles />
      {match ? <PublicVideoView videoId={match[1]} /> : <App />}
    </div>
  );
}

const rootEl = document.getElementById("root");
ReactDOM.createRoot(rootEl).render(<Root />);
</script>
